    <script>
        // --- 狀態管理 ---
        let state = {
            scenario: 'inclusion', 
            phase: 'moving', // moving -> multi -> minus -> formula -> finished
            total: 13,
            divisor: 3,
            step: 0, 
            explStep: 0,
            showSettings: false,
            itemsInitialized: false 
        };

        const childEmojis = ['🧒', '👧', '👦', '🧒🏻', '👧🏼', '👦🏽', '🧒🏾', '👧🏿', '🧒🏼', '👦🏻'];

        function toChineseNum(num) {
            const dict = { 
                0:'零', 1:'一', 2:'二', 3:'三', 4:'四', 5:'五', 6:'六', 7:'七', 8:'八', 9:'九', 10:'十',
                11:'十一', 12:'十二', 13:'十三', 14:'十四', 15:'十五', 16:'十六', 17:'十七', 18:'十八', 19:'十九', 20:'二十'
            };
            return dict[num] || num;
        }

        // --- 初始化與設定 ---
        function setScenario(type) {
            state.scenario = type;
            state.total = type === 'inclusion' ? 13 : 9;
            state.divisor = type === 'inclusion' ? 3 : 2;
            state.itemsInitialized = false;
            resetAll();
        }

        function toggleSettings() {
            state.showSettings = !state.showSettings;
            render();
        }

        function adjustTotal(delta) {
            state.total = Math.max(state.divisor + 1, Math.min(20, state.total + delta));
            state.itemsInitialized = false;
            resetAll();
        }

        function adjustDivisor(delta) {
            state.divisor = Math.max(2, Math.min(6, state.divisor + delta));
            if (state.total <= state.divisor) state.total = state.divisor + 1;
            state.itemsInitialized = false;
            resetAll();
        }

        function resetAll() {
            state.phase = 'moving';
            state.step = 0;
            state.explStep = 0;
            state.showSettings = false;
            render();
        }

        function handleAction() {
            const quotient = Math.floor(state.total / state.divisor);
            if (state.phase === 'moving') {
                if (state.step < quotient) {
                    state.step++;
                    if (state.step === quotient) {
                        state.phase = 'multi'; 
                    }
                }
            } else if (state.phase === 'multi') {
                state.phase = 'minus';
            } else if (state.phase === 'minus') {
                state.phase = 'formula';
            } else if (state.phase === 'formula') {
                state.phase = 'finished';
            }
            render();
        }

        function setExplStep(s) {
            state.explStep = s;
            render();
        }

        // --- 渲染引擎 ---
        function render() {
            const isIncl = state.scenario === 'inclusion';
            const quotient = Math.floor(state.total / state.divisor);
            const remainder = state.total % state.divisor;
            const distributedTotal = quotient * state.divisor;
            const itemName = isIncl ? '草莓' : '氣球';

            document.getElementById('tab-inclusion').className = `tab-btn py-3 px-1 rounded-xl font-bold transition ${isIncl ? 'bg-white shadow-md text-indigo-600 border-b-4 border-indigo-500 scale-105' : 'text-slate-500 hover:bg-slate-50'}`;
            document.getElementById('tab-partitive').className = `tab-btn py-3 px-1 rounded-xl font-bold transition ${!isIncl ? 'bg-white shadow-md text-indigo-600 border-b-4 border-indigo-500 scale-105' : 'text-slate-500 hover:bg-slate-50'}`;
            
            document.getElementById('scenario-title').innerText = isIncl ? '分裝' : '平分';

            const desc = isIncl 
                ? `妮妮把 ${state.total} 顆草莓，每 ${state.divisor} 顆裝一盤，最多可以裝成幾盤？還剩下幾顆草莓？`
                : `有 ${state.total} 顆氣球，平分給 ${state.divisor} 個小朋友，盡量分完，每個人可以分到幾顆？還剩下幾顆氣球？`;
            document.getElementById('scenario-desc').innerText = desc;

            document.getElementById('settings-panel').classList.toggle('hidden', !state.showSettings);
            document.getElementById('display-total').innerText = state.total;
            document.getElementById('display-divisor').innerText = state.divisor;
            document.getElementById('divisor-label').innerText = isIncl ? '每盤裝幾個：' : '小朋友人數：';

            const grid = document.getElementById('items-grid');
            if (!state.itemsInitialized) {
                grid.innerHTML = '';
                const itemEmoji = isIncl ? '🍓' : '🎈';
                for (let i = 0; i < state.total; i++) {
                    const div = document.createElement('div');
                    div.id = `item-grid-${i}`;
                    div.className = `text-4xl transition-all duration-700 scale-100 opacity-100 flex items-center justify-center`;
                    div.innerText = itemEmoji;
                    grid.appendChild(div);
                }
                state.itemsInitialized = true;
            }
            for (let i = 0; i < state.total; i++) {
                const node = document.getElementById(`item-grid-${i}`);
                if (node) {
                    const gone = i < state.step * state.divisor;
                    node.style.opacity = gone ? '0' : '1';
                    node.style.transform = gone ? 'scale(0)' : 'scale(1)';
                }
            }

            const platesContainer = document.getElementById('plates-container');
            const displayPlateCount = isIncl ? (state.step === quotient ? quotient : state.step + 1) : state.divisor;
            const currentPlateNodes = platesContainer.children;
            
            if (currentPlateNodes.length !== displayPlateCount) {
                platesContainer.innerHTML = '';
                for (let i = 0; i < displayPlateCount; i++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = "relative group";
                    if (!isIncl) {
                        const kid = document.createElement('div');
                        kid.className = "absolute -top-8 left-1/2 -translate-x-1/2 text-2xl animate-bounce-child";
                        kid.style.animationDelay = `${i * 0.2}s`;
                        kid.innerText = childEmojis[i % childEmojis.length];
                        wrapper.appendChild(kid);
                    }
                    const plate = document.createElement('div');
                    plate.id = `plate-body-${i}`;
                    plate.className = `relative w-24 h-24 rounded-full border-2 transition-all flex items-center justify-center animate-zoom-in`;
                    const plateGrid = document.createElement('div');
                    plateGrid.id = `plate-grid-${i}`;
                    plateGrid.className = "grid grid-cols-2 gap-1 p-1";
                    plate.appendChild(plateGrid);
                    wrapper.appendChild(plate);
                    platesContainer.appendChild(wrapper);
                }
            }

            const plateItemEmoji = isIncl ? '🍓' : '🎈';
            for (let i = 0; i < displayPlateCount; i++) {
                const plateBody = document.getElementById(`plate-body-${i}`);
                const plateGrid = document.getElementById(`plate-grid-${i}`);
                if (!plateBody || !plateGrid) continue;

                const isFull = i < state.step; 
                const isActive = isIncl ? isFull : true;
                plateBody.className = `relative w-24 h-24 rounded-full border-2 transition-all flex items-center justify-center ${isActive ? 'bg-white border-indigo-400 shadow-md scale-105' : 'bg-slate-50/50 border-slate-100 opacity-20'}`;

                const countShouldBe = isIncl ? (isFull ? state.divisor : 0) : state.step;
                const countCurrent = plateGrid.children.length;

                if (countCurrent < countShouldBe) {
                    for (let j = countCurrent; j < countShouldBe; j++) {
                        const span = document.createElement('span');
                        span.className = "text-xl animate-zoom-in";
                        span.innerText = plateItemEmoji;
                        plateGrid.appendChild(span);
                    }
                } else if (countCurrent > countShouldBe) {
                    plateGrid.innerHTML = ''; 
                }
            }

            const btn = document.getElementById('main-action-btn');
            if (state.phase === 'moving') {
                btn.innerText = isIncl ? `裝第 ${state.step + 1} 盤` : `每人各發 1 個`;
                btn.className = "flex-1 py-4 rounded-xl font-bold text-xl shadow-md bg-orange-500 hover:bg-orange-600 text-white transition active:scale-95";
            } else if (state.phase === 'multi') {
                btn.innerText = isIncl ? '步驟 1：盤子裡裝了幾顆草莓？' : '步驟 1：小朋友一共拿了幾顆氣球？';
                btn.className = "flex-1 py-4 rounded-xl font-bold text-xl shadow-md bg-blue-500 hover:bg-blue-600 text-white transition active:scale-95";
            } else if (state.phase === 'minus') {
                btn.innerText = isIncl ? '步驟 2：還剩下幾顆草莓？' : '步驟 2：還剩下幾顆氣球？';
                btn.className = "flex-1 py-4 rounded-xl font-bold text-xl shadow-md bg-red-500 hover:bg-red-600 text-white transition active:scale-95";
            } else if (state.phase === 'formula') {
                btn.innerText = '步驟 3：用除法算式記下來';
                btn.className = "flex-1 py-4 rounded-xl font-bold text-xl shadow-md bg-indigo-600 hover:bg-indigo-700 text-white transition active:scale-95";
            } else {
                btn.innerText = '除法練習完成！✨';
                btn.className = "flex-1 py-4 rounded-xl font-bold text-xl shadow-md bg-slate-300 text-white cursor-not-allowed";
            }

            const multiCard = document.getElementById('step-multi-card');
            const minusCard = document.getElementById('step-minus-card');
            const summaryPanel = document.getElementById('summary-panel');

            if (state.phase === 'minus' || state.phase === 'formula' || state.phase === 'finished') {
                multiCard.classList.remove('hidden');
                document.getElementById('step-multi-title').innerText = isIncl ? '步驟 1：盤子裡裝了幾顆草莓？' : '步驟 1：小朋友一共拿了幾顆氣球？';
                const formulaHTML = isIncl 
                    ? `${state.divisor} × <span class="underline decoration-4 decoration-blue-600 underline-offset-8">${quotient}</span> = ${distributedTotal}`
                    : `<span class="underline decoration-4 decoration-blue-600 underline-offset-8">${quotient}</span> × ${state.divisor} = ${distributedTotal}`;
                document.getElementById('multi-formula').innerHTML = formulaHTML;
                document.getElementById('multi-hint').innerText = isIncl 
                    ? `每盤裝 ${state.divisor} 顆${itemName}，裝了 ${quotient} 盤，總共裝了 ${distributedTotal} 顆${itemName}`
                    : `每人分到 ${quotient} 顆${itemName}，分給 ${state.divisor} 個人，總共拿走 ${distributedTotal} 顆${itemName}`;
            } else {
                multiCard.classList.add('hidden');
            }

            if (state.phase === 'formula' || state.phase === 'finished') {
                minusCard.classList.remove('hidden');
                document.getElementById('step-minus-title').innerText = isIncl ? '步驟 2：還剩下幾顆草莓？' : '步驟 2：還剩下幾顆氣球？';
                document.getElementById('minus-formula').innerHTML = `${state.total} - ${distributedTotal} = <span class="font-black text-red-600 underline decoration-4 decoration-red-600 underline-offset-8">${remainder}</span>`;
                
                document.getElementById('minus-hint').innerText = isIncl
                    ? `總共有 ${state.total} 顆${itemName}，盤子裡裝了 ${distributedTotal} 顆，還剩下 ${remainder} 顆`
                    : `總共有 ${state.total} 顆${itemName}，小朋友拿走 ${distributedTotal} 顆，還剩下 ${remainder} 顆`;
            } else {
                minusCard.classList.add('hidden');
            }

            if (state.phase === 'finished') {
                summaryPanel.classList.remove('hidden');
                document.getElementById('f-total').innerText = state.total;
                document.getElementById('f-divisor').innerText = state.divisor;
                document.getElementById('f-quotient').innerText = quotient;
                document.getElementById('f-remainder').innerText = remainder;

                document.getElementById('f-total').className = (state.explStep === 1) ? 'text-yellow-300 font-black scale-110 transition-all' : 'transition-all';
                document.getElementById('f-divide').className = (state.explStep === 2) ? 'text-yellow-300 font-black scale-110 transition-all' : 'text-white/40 transition-all';
                document.getElementById('f-divisor').className = (state.explStep === 2) ? 'text-yellow-300 font-black scale-110 transition-all' : 'transition-all';
                document.getElementById('f-quotient').className = (state.explStep === 3) ? 'text-yellow-300 font-black scale-110 transition-all' : 'transition-all';
                document.getElementById('f-remainder').className = (state.explStep === 4) ? 'text-yellow-400 font-black scale-110 transition-all' : 'text-yellow-300 transition-all';

                document.getElementById('a-1').classList.toggle('hidden', state.explStep !== 1);
                document.getElementById('a-2').classList.toggle('hidden', state.explStep !== 2);
                document.getElementById('a-3').classList.toggle('hidden', state.explStep !== 3);
                document.getElementById('a-4').classList.toggle('hidden', state.explStep !== 4);

                const expl = document.getElementById('expl-text');
                if (state.explStep === 0) expl.innerHTML = '<span class="text-white font-bold text-2xl animate-pulse">說說看每個數字代表什麼意思？</span>';
                else if (state.explStep === 1) expl.innerText = `「${state.total}」代表總共有 ${state.total} 顆${itemName}`;
                else if (state.explStep === 2) expl.innerText = isIncl ? `「÷${state.divisor}」代表每 ${state.divisor} 顆裝一盤` : `「÷${state.divisor}」代表平分給 ${state.divisor} 個人`;
                else if (state.explStep === 3) expl.innerText = isIncl ? `「${quotient}」代表最後裝成了 ${quotient} 盤` : `「${quotient}」代表每個人拿到 ${quotient} 顆`;
                else if (state.explStep === 4) expl.innerText = `「${remainder}」代表還剩下 ${remainder} 顆`;

                const readAloud = document.getElementById('read-aloud');
                readAloud.innerHTML = `讀作：<span class="text-yellow-300">${toChineseNum(state.total)}</span> 除以 <span class="text-yellow-300">${toChineseNum(state.divisor)}</span> 等於 <span class="text-yellow-300">${toChineseNum(quotient)}</span> 餘 <span class="text-yellow-300">${toChineseNum(remainder)}</span>`;

                document.querySelectorAll('.expl-btn').forEach((b, i) => {
                    b.className = (state.explStep === i + 1) ? "expl-btn w-12 h-12 rounded-full font-bold bg-yellow-400 text-indigo-900 scale-110 shadow-lg text-xl" : "expl-btn w-12 h-12 rounded-full font-bold bg-white/10 text-white hover:bg-white/20 text-xl";
                });
            } else {
                summaryPanel.classList.add('hidden');
            }
        }
        render();
    </script>
</body>
</html>
