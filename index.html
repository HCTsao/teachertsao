<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紅旗老師的AI教具</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 外部樣式表 -->
    <link rel="stylesheet" href="index.css?v=1.1">
</head>
<body>

    <!-- 主頁面容器 -->
    <div id="main-portal">
        <!-- 頂部橫幅 (Header) -->
        <header class="main-header">
            <div class="header-container">
                <div class="logo-area">
                    <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                    <h1>紅旗老師的AI教具</h1>
                </div>
                <p class="subtitle">為國小數學課堂設計的互動式數位學習軟體</p>
                
                <!-- 搜尋列 -->
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="搜尋教具名稱或關鍵字..." autocomplete="off">
                    <button id="clear-search" class="clear-btn" style="display: none;"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
        </header>

        <!-- 內容區域 -->
        <main class="content-container">
            <!-- 分類側邊欄 / 頂部篩選器 -->
            <section class="filter-section">
                <h2 class="section-title"><i class="fa-solid fa-filter"></i> 年級學期篩選</h2>
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-btn active" data-category="all">全部教具</button>
                    <button class="filter-btn" data-category="二上">二上</button>
                    <button class="filter-btn" data-category="二下">二下</button>
                    <button class="filter-btn" data-category="三上">三上</button>
                    <button class="filter-btn" data-category="三下">三下</button>
                    <button class="filter-btn" data-category="四上">四上</button>
                    <button class="filter-btn" data-category="四下">四下</button>
                    <button class="filter-btn" data-category="五上">五上</button>
                    <button class="filter-btn" data-category="五下">五下</button>
                    <button class="filter-btn" data-category="六上">六上</button>
                    <button class="filter-btn" data-category="六下">六下</button>
                </div>
            </section>

            <!-- 教具列表區域 -->
            <section class="tools-section">
                <div class="tools-header">
                    <h2 id="current-category-title">所有教具</h2>
                    <span class="count-badge" id="tools-count">0 個項目</span>
                </div>
                
                <!-- 卡片網格 -->
                <div class="tools-grid" id="tools-grid">
                    <!-- 經由 JavaScript 動態生成 -->
                </div>
            </section>
        </main>

        <!-- 頁尾 -->
        <footer class="main-footer">
            <p>© 2026 紅旗老師的AI教具. All rights reserved. | 數位學習·互動課堂</p>
        </footer>
    </div>



    <!-- 外部邏輯腳本 -->
    <script src="app.js?v=1.1"></script>
</body>
</html>
