<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紅旗老師的AI教具</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 外部樣式表 -->
    <link rel="stylesheet" href="index.css?v=1.1">
</head>
<body>

    <!-- 主頁面容器 -->
    <div id="main-portal">
        <!-- 頂部橫幅 (Header) -->
        <header class="main-header">
            <!-- 浮動數學背景符號 -->
            <span class="floating-math-symbol symbol-1">π</span>
            <span class="floating-math-symbol symbol-2">√</span>
            <span class="floating-math-symbol symbol-3">%</span>
            <span class="floating-math-symbol symbol-4">＋</span>

            <div class="header-container">
                <!-- 頂部左上角標題 -->
                <div class="logo-area">
                    <div class="logo-icon"><i class="fa-solid fa-calculator"></i></div>
                    <h1>紅旗老師的AI教具</h1>
                </div>

                <!-- 下方內容網格 (左側圖片，右側 QR Code) -->
                <div class="header-content-flex">
                    <!-- 左側：門戶特色圖片 (直接以 img 呈現，不蓋到圖) -->
                    <div class="banner-hero-img-box">
                        <img src="website_hero.jpg" alt="紅旗老師的教學場景" class="banner-hero-img">
                    </div>

                    <!-- 右側：QR Code 卡片 -->
                    <div class="banner-qrcode-box">
                        <div class="qrcode-card-inner">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://hctsao.github.io/teachertsao/&color=7c2d12&bgcolor=fff7ed" alt="QR Code" class="qrcode-badge-img">
                            <div class="qrcode-subtext">學生掃描直接進入！</div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 內容區域 -->
        <main class="content-container">
            <!-- 分類側邊欄 / 頂部篩選器 -->
            <section class="filter-section">
                <h2 class="section-title"><i class="fa-solid fa-filter"></i> 年級學期篩選</h2>
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-btn active" data-category="all">全部教具</button>

                    <button class="filter-btn" data-category="二上">二上</button>
                    <button class="filter-btn" data-category="二下">二下</button>
                    <button class="filter-btn" data-category="三上">三上</button>
                    <button class="filter-btn" data-category="三下">三下</button>
                    <button class="filter-btn" data-category="四上">四上</button>
                    <button class="filter-btn" data-category="四下">四下</button>
                    <button class="filter-btn" data-category="五上">五上</button>
                    <button class="filter-btn" data-category="五下">五下</button>
                    <button class="filter-btn" data-category="六上">六上</button>
                    <button class="filter-btn" data-category="六下">六下</button>
                </div>
            </section>

            <!-- 教具列表區域 -->
            <section class="tools-section">
                <div class="tools-header">
                    <h2 id="current-category-title">所有教具</h2>
                    <span class="count-badge" id="tools-count">0 個項目</span>
                </div>
                
                <!-- 卡片網格 -->
                <div class="tools-grid" id="tools-grid">
                    <!-- 經由 JavaScript 動態生成 -->
                </div>
            </section>
        </main>

        <!-- 頁尾 -->
        <footer class="main-footer">
            <div class="footer-container">
                <div class="counter-card">
                    <span class="counter-label"><i class="fa-solid fa-chart-line"></i> 累積瀏覽人次</span>
                    <!-- 瀏覽人次計數器 SVG -->
                    <div class="counter-badge-wrapper">
                        <img src="https://api.visitorbadge.io/api/visitors?path=hctsao.teachertsao&label=Views&labelColor=%23475569&countColor=%23ea580c" alt="Visitor Counter" class="counter-badge-img">
                    </div>
                </div>
                <p class="footer-copyright">© 2026 紅旗老師的AI教具. All rights reserved. | 數位學習·互動課堂</p>
            </div>
        </footer>
    </div>



    <!-- 外部邏輯腳本 -->
    <script src="app.js?v=1.1"></script>
</body>
</html>
