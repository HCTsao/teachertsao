    <style>
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* Digging effect: Visible -> Disappears */
        @keyframes dig-effect {
            0%, 20% { opacity: 0; }   /* Start invisible (Full Shape) */
            50%, 80% { opacity: 1; }  /* Appear (The Cut) */
            100% { opacity: 0; }      /* Fade out */
        }
        /* Reveal effect: Invisible -> Visible */
        @keyframes reveal-effect {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        /* Rotate Reveal Loop for Problem 5 */
        @keyframes rotate-reveal-loop {
            0% { transform: rotate(0deg); opacity: 0; }
            20% { opacity: 1; } 
            40%, 80% { transform: rotate(180deg); opacity: 1; } 
            100% { transform: rotate(180deg); opacity: 0; }
        }

        /* Cycle Highlight for 2 items */
        @keyframes cycle-highlight-2 {
            0%, 45% { opacity: 1; } 
            50%, 100% { opacity: 0.3; } 
        }

        /* Accumulate Highlight for 4 items (Square triangles) 
           Total 4s cycle.
           1: 0-90% ON
           2: 25-90% ON
           3: 50-90% ON
           4: 75-90% ON
           90-100% ALL OFF
        */
        @keyframes acc-4-1 {
            0%, 90% { opacity: 1; fill: #fbbf24; } 
            95%, 100% { opacity: 0; fill: #fbbf24; }
        }
        @keyframes acc-4-2 {
            0%, 24% { opacity: 0; fill: #fbbf24; }
            25%, 90% { opacity: 1; fill: #fbbf24; } 
            95%, 100% { opacity: 0; fill: #fbbf24; }
        }
        @keyframes acc-4-3 {
            0%, 49% { opacity: 0; fill: #fbbf24; }
            50%, 90% { opacity: 1; fill: #fbbf24; } 
            95%, 100% { opacity: 0; fill: #fbbf24; }
        }
        @keyframes acc-4-4 {
            0%, 74% { opacity: 0; fill: #fbbf24; }
            75%, 90% { opacity: 1; fill: #fbbf24; } 
            95%, 100% { opacity: 0; fill: #fbbf24; }
        }

        /* Accumulate Highlight for 8 items */
        @keyframes acc-8-1 {
            0%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-2 {
            0%, 10% { opacity: 0.2; fill: #fca5a5; }
            11%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-3 {
            0%, 21% { opacity: 0.2; fill: #fca5a5; }
            22%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-4 {
            0%, 32% { opacity: 0.2; fill: #fca5a5; }
            33%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-5 {
            0%, 43% { opacity: 0.2; fill: #fca5a5; }
            44%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-6 {
            0%, 54% { opacity: 0.2; fill: #fca5a5; }
            55%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-7 {
            0%, 65% { opacity: 0.2; fill: #fca5a5; }
            66%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }
        @keyframes acc-8-8 {
            0%, 76% { opacity: 0.2; fill: #fca5a5; }
            77%, 90% { opacity: 1; fill: #ef4444; }
            95%, 100% { opacity: 0.2; fill: #fca5a5; }
        }

        .animate-pulse-slow { animation: pulse-opacity 2s infinite; }
        .animate-dig { animation: dig-effect 3s infinite; }
        .animate-reveal { animation: reveal-effect 1s forwards; }
        .animate-rotate-loop { animation: rotate-reveal-loop 4s infinite; }
        
        .animate-bounce-short { animation: bounce 0.5s ease-in-out 1; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        /* Fraction Styles */
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.8em; margin: 0 0.2em; }
        .frac-n { border-bottom: 1px solid currentColor; padding: 0 2px; line-height: 1; }
        .frac-d { padding: 0 2px; line-height: 1; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Icons
        const Play = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
        const RotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>);
        const Check = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const ArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>);
        const HelpCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);
        const Calculator = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>);
        const Scissors = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>);

        // Fraction Component
        const Frac = ({ n, d }) => (
            <span className="frac">
                <span className="frac-n">{n}</span>
                <span className="frac-d">{d}</span>
            </span>
        );

        const { useState, useEffect } = React;
        const formatNum = (num) => parseFloat(num.toFixed(2));

        const PROBLEMS = [
            {
                id: 0,
                name: "課本第3題",
                params: { SIDE: 20, PI: 3.14 },
                getValues: (p) => ({ 
                    squareArea: p.SIDE * p.SIDE,
                    sectorArea: formatNum(p.SIDE * p.SIDE * p.PI / 4),
                    finalArea: formatNum((p.SIDE * p.SIDE) - (p.SIDE * p.SIDE * p.PI / 4))
                }),
                steps: (vals, p) => [
                    { 
                        title: "觀察圖形", 
                        instruction: "請問藍色區域的面積怎麼算？\n\n仔細觀察，它是一個正方形，被挖掉了一個白色的扇形。", 
                        action: "next", 
                        hint: "藍色面積 = 正方形面積 - 空白扇形面積", 
                        mode: "intro" 
                    },
                    { 
                        title: "第一步：計算正方形面積", 
                        instruction: "我們先算出整個大正方形的面積。", 
                        subInstruction: `邊長 ${p.SIDE}cm 的正方形面積 = ?`, 
                        action: "input", 
                        correctAnswer: vals.squareArea.toString(), 
                        hint: "正方形面積 = 邊長 × 邊長", 
                        mode: "calc_square" 
                    },
                    { 
                        title: "第二步：計算空白扇形面積", 
                        instruction: (
                            <>接著，算出被挖掉的白色扇形面積。<br/>這是一個半徑 {p.SIDE}cm 的 <Frac n="1" d="4" /> 圓。</>
                        ), 
                        subInstruction: `半徑 ${p.SIDE}cm 的 <span class="frac"><span class="frac-n">1</span><span class="frac-d">4</span></span> 圓面積 = ?\n(圓周率用${p.PI}計算)`, 
                        action: "input", 
                        correctAnswer: vals.sectorArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.sectorArea) < 0.5,
                        hint: `圓面積 = 半徑 × 半徑 × ${p.PI}\n扇形是圓的 1/4`, 
                        mode: "calc_sector" 
                    },
                    { 
                        title: "第三步：計算藍色區域面積", 
                        instruction: "最後，用正方形面積減去空白扇形面積，就是答案囉！", 
                        subInstruction: `正方形(${vals.squareArea}) - 扇形(${vals.sectorArea}) = ?`, 
                        action: "input", 
                        correctAnswer: vals.finalArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.finalArea) < 0.5,
                        hint: "把剛剛算出來的兩個數字相減。", 
                        mode: "calc_final" 
                    },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "done" }
                ]
            },
            {
                id: 1,
                name: "課本第4題",
                params: { R: 10, PI: 3.14 },
                getValues: (p) => ({ 
                    sectorArea: formatNum(p.R * p.R * p.PI / 4),
                    triArea: formatNum(p.R * p.R / 2),
                    finalArea: formatNum((p.R * p.R * p.PI / 4) - (p.R * p.R / 2))
                }),
                steps: (vals, p) => [
                    { 
                        title: "觀察圖形", 
                        instruction: "請問橘色區域的面積怎麼算？\n\n它是一個扇形，被剪掉了一個白色的直角三角形。", 
                        action: "next", 
                        hint: "橘色面積 = 扇形面積 - 三角形面積", 
                        mode: "intro" 
                    },
                    { 
                        title: "第一步：計算扇形面積", 
                        instruction: (
                            <>我們先算整個 <Frac n="1" d="4" /> 圓（扇形）的面積。<br/>半徑是 {p.R}cm。</>
                        ), 
                        subInstruction: `半徑 ${p.R}cm 的 <span class="frac"><span class="frac-n">1</span><span class="frac-d">4</span></span> 圓面積 = ?\n(圓周率用${p.PI}計算)`, 
                        action: "input", 
                        correctAnswer: vals.sectorArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.sectorArea) < 0.5,
                        hint: `扇形面積 = 半徑 × 半徑 × ${p.PI} ÷ 4`, 
                        mode: "calc_sector" 
                    },
                    { 
                        title: "第二步：計算三角形面積", 
                        instruction: "接著，算出要被剪掉的直角三角形面積。\n它的底和高都是半徑。", 
                        subInstruction: `底 ${p.R}cm、高 ${p.R}cm 的三角形面積 = ?`, 
                        action: "input", 
                        correctAnswer: vals.triArea.toString(), 
                        hint: "三角形面積 = 底 × 高 ÷ 2", 
                        mode: "calc_tri" 
                    },
                    { 
                        title: "第三步：計算塗色面積", 
                        instruction: "最後，用扇形面積減去三角形面積，就是答案囉！", 
                        subInstruction: `扇形(${vals.sectorArea}) - 三角形(${vals.triArea}) = ?`, 
                        action: "input", 
                        correctAnswer: vals.finalArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.finalArea) < 0.5,
                        hint: "把剛剛算出來的兩個數字相減。", 
                        mode: "calc_final" 
                    },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "done" }
                ]
            },
            {
                id: 2,
                name: "課本第5題",
                params: { R: 10, PI: 3.14 },
                getValues: (p) => ({ 
                    sectorArea: formatNum(p.R * p.R * p.PI / 4),
                    triArea: formatNum(p.R * p.R / 2),
                    halfLeaf: formatNum((p.R * p.R * p.PI / 4) - (p.R * p.R / 2)),
                    totalLeaf: formatNum(((p.R * p.R * p.PI / 4) - (p.R * p.R / 2)) * 2)
                }),
                steps: (vals, p) => [
                    { 
                        title: "觀察圖形", 
                        instruction: "請問中間綠色葉子形狀的面積怎麼算？\n\n這是一個葉形，它其實是由「兩個半片葉子」組成的！\n(就像是把第4題的形狀重複兩次)", 
                        action: "next", 
                        hint: "畫一條對角線，你就會看到兩個一樣的形狀。", 
                        mode: "intro" 
                    },
                    { 
                        title: "第一步：分析圖形", 
                        instruction: "我們畫一條粉紅色的對角線。\n\n看到了嗎？葉形被分成了上下兩個一樣的形狀。", 
                        subInstruction: "我們只要算出一半的面積，再乘以 2 就好了。", 
                        action: "next", 
                        hint: "先專注算其中一半。", 
                        mode: "analyze" 
                    },
                    { 
                        title: "第二步：計算扇形面積", 
                        instruction: (
                            <>我們先算一半的「扇形」面積。<br/>這是一個半徑 {p.R}cm 的 <Frac n="1" d="4" /> 圓。</>
                        ), 
                        subInstruction: `半徑 ${p.R}cm 的 <span class="frac"><span class="frac-n">1</span><span class="frac-d">4</span></span> 圓面積 = ?\n(圓周率用${p.PI}計算)`, 
                        action: "input", 
                        correctAnswer: vals.sectorArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.sectorArea) < 0.5,
                        hint: `扇形面積 = 半徑 × 半徑 × ${p.PI} ÷ 4`, 
                        mode: "calc_sector_only" 
                    },
                    { 
                        title: "第三步：計算三角形面積", 
                        instruction: "接著，我們算要減掉的「直角三角形」面積。\n\n(注意：只算黃色部分)", 
                        subInstruction: `底 ${p.R}cm、高 ${p.R}cm 的三角形面積 = ?`, 
                        action: "input", 
                        correctAnswer: vals.triArea.toString(), 
                        hint: "三角形面積 = 底 × 高 ÷ 2", 
                        mode: "calc_tri_only" 
                    },
                    { 
                        title: "第四步：計算半片葉子面積", 
                        instruction: "半片葉子 = 扇形 - 三角形。\n\n(看動畫：用扇形挖掉三角形，就是半片葉子)", 
                        subInstruction: `扇形(${vals.sectorArea}) - 三角形(${vals.triArea}) = ?`, 
                        action: "input", 
                        correctAnswer: vals.halfLeaf.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.halfLeaf) < 0.5,
                        hint: "相減算出半邊的面積。", 
                        mode: "calc_half" 
                    },
                    { 
                        title: "第五步：計算總面積", 
                        instruction: "太棒了！半片葉子是 28.5。\n因為有兩個一模一樣的形狀，所以總面積是...？\n\n(看動畫：上下兩片葉子正在輪流閃爍)", 
                        subInstruction: `半片葉子(${vals.halfLeaf}) × 2 = ?`, 
                        action: "input", 
                        correctAnswer: vals.totalLeaf.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.totalLeaf) < 0.5,
                        hint: "把剛剛算出來的答案乘以 2。", 
                        mode: "calc_total" 
                    },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "done" }
                ]
            },
            {
                id: 3,
                name: "課本第6題",
                params: { BIG_SIDE: 4, SMALL_SIDE: 2, PI: 3.14 }, // R = 2
                getValues: (p) => ({ 
                    // Leaf calculation for R=2
                    sectorArea: formatNum(p.SMALL_SIDE * p.SMALL_SIDE * p.PI / 4), // 2*2*3.14/4 = 3.14
                    triArea: formatNum(p.SMALL_SIDE * p.SMALL_SIDE / 2), // 2*2/2 = 2
                    oneLeaf: formatNum(((p.SMALL_SIDE * p.SMALL_SIDE * p.PI / 4) - (p.SMALL_SIDE * p.SMALL_SIDE / 2)) * 2), // (3.14-2)*2 = 2.28
                    // Half leaf unit
                    halfLeafUnit: formatNum((p.SMALL_SIDE * p.SMALL_SIDE * p.PI / 4) - (p.SMALL_SIDE * p.SMALL_SIDE / 2)),
                    totalArea: formatNum(((p.SMALL_SIDE * p.SMALL_SIDE * p.PI / 4) - (p.SMALL_SIDE * p.SMALL_SIDE / 2)) * 8) // 1.14 * 8 = 9.12
                }),
                steps: (vals, p) => [
                    { 
                        title: "觀察圖形", 
                        instruction: "這朵花由 4 片葉子組成，請問塗色面積是多少？\n\n正方形邊長是 4cm。", 
                        action: "next", 
                        hint: "我們可以把它切成 4 個小正方形來看。", 
                        mode: "intro" 
                    },
                    { 
                        title: "第一步：分析圖形", 
                        instruction: "畫出十字虛線，把大正方形分成 4 個小正方形。\n每個小正方形的邊長是 2cm。\n\n看到了嗎？每個小正方形裡都有一片葉子。", 
                        subInstruction: "我們先專注算左上角那片葉子的「一半」。", 
                        action: "next", 
                        hint: "目標：算出半片葉子。", 
                        mode: "analyze" 
                    },
                    { 
                        title: "第二步：計算扇形面積", 
                        instruction: (
                            <>我們先算左上角小正方形裡的「扇形」面積。<br/>半徑是 2cm 的 <Frac n="1" d="4" /> 圓。</>
                        ), 
                        subInstruction: `半徑 2cm 的 <span class="frac"><span class="frac-n">1</span><span class="frac-d">4</span></span> 圓面積 = ?\n(圓周率用${p.PI}計算)`, 
                        action: "input", 
                        correctAnswer: vals.sectorArea.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.sectorArea) < 0.1,
                        hint: `扇形面積 = 半徑 × 半徑 × ${p.PI} ÷ 4`, 
                        mode: "calc_sector_only" 
                    },

                    <line x1={75} y1={90} x2={75} y2={100} stroke="#64748b" strokeWidth="2" />
                    <line x1={275} y1={90} x2={275} y2={100} stroke="#64748b" strokeWidth="2" />

                    <text x={285} y={200} textAnchor="start" dominantBaseline="middle" className="text-lg font-bold fill-slate-600">4cm</text>
                    <line x1={280} y1={100} x2={280} y2={300} stroke="#64748b" strokeWidth="2" />
                    <line x1={275} y1={100} x2={285} y2={100} stroke="#64748b" strokeWidth="2" />
                    <line x1={275} y1={300} x2={285} y2={300} stroke="#64748b" strokeWidth="2" />

                </svg>
              );
          };

          // Render Practice Problem (Circle - Square)
          const renderPractice = () => {
              const cx = 175;
              const cy = 200;
              const r = 100; // 5cm -> 100px scale
              
              // Circle
              const pathCircle = `M ${cx-r},${cy} a ${r},${r} 0 1,0 ${2*r},0 a ${r},${r} 0 1,0 -${2*r},0`;
              
              // Inscribed Square (Diamond)
              const pathSquare = `M ${cx},${cy-r} L ${cx+r},${cy} L ${cx},${cy+r} L ${cx-r},${cy} Z`;
              
              // 4 Triangles
              const pathT1 = `M ${cx},${cy} L ${cx-r},${cy} L ${cx},${cy-r} Z`; // TL (1)
              const pathT2 = `M ${cx},${cy} L ${cx},${cy-r} L ${cx+r},${cy} Z`; // TR (2)
              const pathT3 = `M ${cx},${cy} L ${cx+r},${cy} L ${cx},${cy+r} Z`; // BR (3)
              const pathT4 = `M ${cx},${cy} L ${cx},${cy+r} L ${cx-r},${cy} Z`; // BL (4)

              // Animations
              let circleFill = "url(#purpleGrad)";
              let squareOpacity = 1;
              let squareClass = "";
              let animateTri = false;
              let animateOneTri = false;
              let showIntroHelper = false;

              if (displayMode === 'intro') {
                showIntroHelper = true; // Show diagonals and center mark
                squareOpacity = 1;
              } else if (displayMode === 'calc_circle') {
                  squareOpacity = 0; // Show full circle
              } else if (displayMode === 'calc_one_tri') {
                  // Hide Circle color
                  circleFill = "transparent";
                  animateOneTri = true;
                  squareOpacity = 0; 
              } else if (displayMode === 'calc_four_tri') {
                  circleFill = "transparent";
                  animateTri = true;
                  squareOpacity = 0;
              } else if (displayMode === 'calc_final') {
                  squareClass = "animate-dig";
              }

              return (
                <svg viewBox="0 0 350 400" className="w-full h-full drop-shadow-md">
                    <defs>
                        <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#d8b4fe" /><stop offset="100%" stopColor="#a855f7" /></linearGradient>
                    </defs>
                    <rect width="350" height="400" fill="url(#grid)" opacity="0.4" />

                    {/* Circle Base */}
                    <circle cx={cx} cy={cy} r={r} fill={circleFill} stroke="#9333ea" strokeWidth="2" />

                    {/* Square (White) */}
                    {!animateTri && !animateOneTri && (
                        <path d={pathSquare} fill="white" stroke="#94a3b8" strokeWidth="2" 
                              style={{ opacity: squareOpacity }} className={squareClass} />
                    )}

                    {/* Intro Helper Lines (On Top of Square) */}
                    {showIntroHelper && (
                        <>
                            <line x1={cx} y1={cy-r} x2={cx} y2={cy+r} stroke="#64748b" strokeWidth="2" strokeDasharray="4,4" />
                            <line x1={cx-r} y1={cy} x2={cx+r} y2={cy} stroke="#64748b" strokeWidth="2" strokeDasharray="4,4" />
                            {/* Right Angle at Center (Bottom-Right quadrant) */}
                            <path d={`M ${cx},${cy+15} L ${cx+15},${cy+15} L ${cx+15},${cy}`} fill="none" stroke="#64748b" strokeWidth="2" />
                        </>
                    )}

                    {/* 1 Triangle Highlight (TL) */}
                    {animateOneTri && (
                         <>
                            <path d={pathT1} fill="#fbbf24" stroke="#d97706" strokeWidth="2" />
                            {/* Right Angle at Center (Top-Left quadrant for T1) */}
                            <path d={`M ${cx},${cy-15} L ${cx-15},${cy-15} L ${cx-15},${cy}`} fill="none" stroke="#64748b" strokeWidth="2" />
                         </>
                    )}

                    {/* 4 Triangles Animation (TL->TR->BR->BL) */}
                    {animateTri && (
                        <g>
                            <path d={pathT1} fill="#fbbf24" stroke="#d97706" strokeWidth="2" style={{animation: 'acc-4-1 4s infinite'}} />
                            <path d={pathT2} fill="#fbbf24" stroke="#d97706" strokeWidth="2" style={{animation: 'acc-4-2 4s infinite'}} />
                            <path d={pathT3} fill="#fbbf24" stroke="#d97706" strokeWidth="2" style={{animation: 'acc-4-3 4s infinite'}} />
                            <path d={pathT4} fill="#fbbf24" stroke="#d97706" strokeWidth="2" style={{animation: 'acc-4-4 4s infinite'}} />
                        </g>
                    )}

                    {/* Radius Label - Always on top */}
                    {(showIntroHelper || displayMode === 'calc_circle' || displayMode === 'calc_one_tri') && (
                        <g>
                            {/* 12 o'clock radius */}
                            <line x1={cx} y1={cy} x2={cx} y2={cy-r} stroke="#475569" strokeWidth="2" />
                            <circle cx={cx} cy={cy} r={3} fill="#475569" />
                            <text x={cx+5} y={cy-50} className="text-lg font-bold fill-slate-700 bg-white/60">5cm</text>
                        </g>
                    )}

                </svg>
              );
          };

          return (
            <div className="flex flex-col items-center min-h-screen p-4 font-sans bg-gray-50">
              <div className="w-full max-w-5xl flex gap-2 mb-4">
                  {PROBLEMS.map(p => (
                      <button key={p.id} onClick={() => handleTabChange(p.id)} className={`flex-1 py-3 px-6 rounded-xl font-bold text-lg transition-all shadow-sm ${currentProbId === p.id ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'bg-white text-gray-500 hover:bg-indigo-50'}`}>
                          {p.name}
                      </button>
                  ))}
              </div>
              <div className="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border-4 border-white min-h-[500px]">
                <div className="w-full md:w-1/2 bg-slate-50 p-6 flex flex-col items-center justify-center border-r border-slate-200 relative overflow-hidden">
                  <div className="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-slate-500 font-bold text-sm flex items-center gap-2 shadow-sm z-10"><Calculator className="w-4 h-4" /> 互動教學板</div>
                  <div className="relative w-full max-w-[350px] aspect-[3.5/4] select-none">
                      {currentProbId === 0 && renderProblem3()}
                      {currentProbId === 1 && renderProblem4()}
                      {currentProbId === 2 && renderProblem5()}
                      {currentProbId === 3 && renderProblem6()}
                      {currentProbId === 4 && renderPractice()}
                  </div>
                  <div className="mt-2 bg-yellow-50 border border-yellow-200 p-3 rounded-lg text-xs text-yellow-800 flex gap-2 max-w-[90%]"><HelpCircle className="w-4 h-4 flex-shrink-0" /><span>小提示：圓周率我們使用 3.14 來計算喔！</span></div>
                </div>
                <div className="w-full md:w-1/2 p-8 flex flex-col relative bg-white">
                  <div className="flex gap-2 mb-8 justify-center">{steps.map((s, idx) => (<div key={idx} className={`h-2 rounded-full transition-all duration-300 ${idx === step ? 'w-8 bg-indigo-600' : 'w-2 bg-indigo-100'}`} />))}</div>
                  <div className="flex-1 flex flex-col justify-center">
                    <h1 className="text-2xl font-extrabold text-slate-800 mb-4">{currentStep.title}</h1>
                    <div className="text-lg text-slate-600 mb-8 leading-relaxed font-medium whitespace-pre-line">
                        {typeof currentStep.instruction === 'string' ? currentStep.instruction : currentStep.instruction}
                    </div>
                    <div className="min-h-[160px]">
                      {currentStep.action === 'next' && (
                        <button onClick={handleNext} className="w-full group bg-indigo-600 hover:bg-indigo-700 text-white text-xl py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-indigo-200 flex items-center justify-center gap-3"><Play className="w-6 h-6 fill-current group-hover:scale-110 transition-transform" /> 開始學習</button>
                      )}
                      
                      {currentStep.action === 'input' && (
                        <div className="space-y-6 animate-fade-in-up">
                          <div className="bg-slate-50 border-2 border-indigo-100 p-6 rounded-2xl">
                            <p className="font-bold text-indigo-900 mb-2 text-sm uppercase tracking-wider">計算題</p>
                            <p className="text-xl text-slate-700 font-mono mb-4 whitespace-pre-line text-center" dangerouslySetInnerHTML={{__html: currentStep.subInstruction}}></p>
                            
                            <div className="flex flex-col gap-4">
                                <div className="flex items-center gap-2">
                                    <input 
                                        type="number" 
                                        value={inputValue} 
                                        onChange={(e) => { setInputValue(e.target.value); setFeedback(""); }} 
                                        placeholder="?" 
                                        className="flex-1 border-2 border-slate-200 rounded-xl px-5 py-3 text-xl focus:outline-none focus:border-indigo-500 text-center font-bold text-slate-700" 
                                        onKeyDown={(e) => e.key === 'Enter' && checkAnswer()} 
                                    />
                                    <span className="text-xl font-bold text-slate-600 shrink-0">cm<sup className="text-xs">2</sup></span>
                                </div>
                                <button onClick={checkAnswer} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold text-lg shadow-md transition-all">檢查</button>
                            </div>

                          </div>
                          {feedback === 'correct' && (<div className="bg-green-100 text-green-800 p-4 rounded-xl flex items-center gap-4 animate-bounce-short border border-green-200"><div className="bg-green-500 text-white p-1 rounded-full"><Check className="w-5 h-5" /></div><span className="font-bold text-lg">完全正確！</span><button onClick={handleNext} className="ml-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-sm flex items-center gap-1 shadow-sm">下一步 <ArrowRight className="w-4 h-4" /></button></div>)}
                          {feedback === 'incorrect' && (<div className="bg-red-50 text-red-800 p-4 rounded-xl flex items-center gap-4 animate-shake border border-red-100"><span className="font-bold">答案不太對喔...</span><button onClick={() => setShowHint(true)} className="ml-auto text-sm font-bold underline hover:text-red-900">看提示</button></div>)}
                        </div>
                      )}
                      {currentStep.action === 'reset' && (
                        <div className="text-center py-4"><div className="inline-block p-4 bg-green-100 rounded-full mb-4"><Check className="w-12 h-12 text-green-600" /></div><h3 className="text-2xl font-bold text-slate-800 mb-2">太厲害了！</h3><p className="text-slate-600 mb-8">你已經學會了這一題的算法。</p><button onClick={handleReset} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-full font-bold shadow-lg flex items-center justify-center gap-2 mx-auto"><RotateCcw className="w-5 h-5" /> 再玩一次</button></div>
                      )}
                    </div>
                  </div>
                  {showHint && currentStep.hint && (<div className="absolute bottom-24 left-8 right-8 bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded shadow-lg animate-fade-in z-20"><div className="flex justify-between items-start"><p className="text-yellow-800 font-medium whitespace-pre-line">{currentStep.hint}</p><button onClick={() => setShowHint(false)} className="text-yellow-600 hover:text-yellow-800">✕</button></div></div>)}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AreaTutor />);
    </script>
</body>
</html>
