<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>複合圖形周長教學 - 優化版 (含單位)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes dash-move { to { stroke-dashoffset: -100; } }
        .animate-dash-move { animation: dash-move 2s linear infinite; }
        .animate-bounce-short { animation: bounce 0.5s ease-in-out 1; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }

        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Fraction Styles */
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.8em; margin: 0 0.2em; }
        .frac-n { border-bottom: 1px solid currentColor; padding: 0 2px; line-height: 1; }
        .frac-d { padding: 0 2px; line-height: 1; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-indigo-50 font-sans text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // Icons
        const Play = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
        const RotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>);
        const Check = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const ArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>);
        const HelpCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);
        const Calculator = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>);
        const Move = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="15 19 12 22 9 19"></polyline><polyline points="19 9 22 12 19 15"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>);

        // Fraction Component
        const Frac = ({ n, d }) => (
            <span className="frac">
                <span className="frac-n">{n}</span>
                <span className="frac-d">{d}</span>
            </span>
        );

        const { useState, useEffect, useRef } = React;
        const formatNum = (num) => parseFloat(num.toFixed(2));

        const PROBLEMS = [
            {
                id: 0,
                name: "課本第1題",
                params: { DIAMETER: 20, HEIGHT: 16, PI: 3.14 },
                getValues: (p) => ({ curve: formatNum(p.DIAMETER * p.PI), straight: p.HEIGHT * 2, total: formatNum((p.HEIGHT * 2) + (p.DIAMETER * p.PI)) }),
                steps: (vals, p) => [
                    { title: "單元開始：認識周長", instruction: "請仔細觀察圖形。\n紅點正在沿著邊緣移動，這一圈就是「周長」。", action: "next", hint: "周長 = 輪廓線總長度。", mode: "trace" },
                    { title: "第一步：計算直線", instruction: "先算直線部分。\n請觀察左右兩邊亮起來的紅線。", subInstruction: `左邊 (${p.HEIGHT}cm) + 右邊 (${p.HEIGHT}cm) = ?`, action: "input", correctAnswer: vals.straight.toString(), hint: "左右兩邊都是 16cm。", mode: "straight" },
                    { title: "第二步：計算曲線 (觀察)", instruction: "上面有凸出的半圓，下面有凹入的半圓。\n\n點擊「看動畫」觀察它們的關係！", action: "animate_demo", hint: "下方的弧線移上去會變成什麼？", mode: "curve_observe" },
                    { title: "第二步：計算曲線 (計算)", instruction: "這兩個半圓弧，剛好拼成一個完整的圓！", subInstruction: `直徑 ${p.DIAMETER}cm 的圓周長 = ?\n(圓周率用 ${p.PI})`, action: "input", correctAnswer: vals.curve.toString(), validate: (val) => Math.abs(parseFloat(val) - vals.curve) < 0.1, hint: `圓周長 = 直徑 × ${p.PI}`, mode: "curve_calc" },
                    { title: "第三步：總結", instruction: "圖形周長 = 直線總長 + 圓周長。\n把剛剛算出的數字加起來！", subInstruction: `${vals.straight} + ${vals.curve} = ?`, action: "input", correctAnswer: vals.total.toString(), hint: `直線是 ${vals.straight}，曲線是 ${vals.curve}。`, mode: "total" },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "trace" }
                ]
            },
            {
                id: 1,
                name: "課本第2題",
                params: { WIDTH: 30, PI: 3.14 },
                getValues: (p) => ({ 
                    // 4 arcs of radius 15.
                    // Total = 4 * (1/4 * 2 * PI * 15) = 30 * PI.
                    total: formatNum(p.WIDTH * p.PI) 
                }),
                steps: (vals, p) => [
                    { title: "單元開始：認識周長", instruction: "請觀察這個圖形。\n它有 2 條凸出來的弧線，和 2 條凹進去的弧線。", action: "next", hint: "紅點移動的路徑就是周長。", mode: "trace" },
                    { 
                        title: "第一步：分析圖形", 
                        instruction: (
                            <>這 4 條弧線長度其實都是一樣的！<br/><br/>它們都是半徑 15cm 的 <Frac n="1" d="4" /> 圓弧。</>
                        ), 
                        subInstruction: "注意看：兩邊凸出，兩邊凹入。", 
                        action: "next", 
                        hint: "雖然方向不同，但彎曲程度都一樣喔。", 
                        mode: "analyze" 
                    },
                    { title: "第二步：神奇的變化", instruction: "如果不計算，我們要怎麼知道總長度呢？\n\n點擊「看動畫」把凹進去的弧線翻出來！", action: "animate_demo", hint: "注意看藍色的線條就好，原本的形狀不會變喔！", mode: "curve_observe" },
                    { 
                        title: "第三步：計算圓周長", 
                        instruction: "把弧線翻出來，剛好圍成一個圓！\n\n所以周長就是一個圓的長度。", 
                        subInstruction: `直徑 ${p.WIDTH}cm 的圓周長 = ?\n(圓周率用${p.PI}計算)`, 
                        action: "input", 
                        correctAnswer: vals.total.toString(), 
                        validate: (val) => Math.abs(parseFloat(val) - vals.total) < 0.1, 
                        hint: `圓周長 = 直徑 × ${p.PI}`, 
                        mode: "curve_calc" 
                    },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "trace" }
                ]
            },
            {
                id: 2,
                name: "課本做做看",
                params: { D_SMALL: 10, D_BIG: 20, PI: 3.14 },
                getValues: (p) => ({
                    // Big arc (half circle D=20): 20 * 3.14 / 2 = 31.4
                    // Small circle (two halfs D=10): 10 * 3.14 = 31.4
                    // Total: 62.8
                    smallCircle: formatNum(p.D_SMALL * p.PI),
                    bigArc: formatNum(p.D_BIG * p.PI / 2),
                    total: formatNum((p.D_BIG * p.PI / 2) + (p.D_SMALL * p.PI))
                }),
                steps: (vals, p) => [
                    { title: "單元開始：認識周長", instruction: "請仔細觀察這個圖形。\n它像一個太極圖，由三個半圓組成。", action: "next", hint: "注意看有大半圓和小半圓喔。", mode: "trace" },
                    { title: "第一步：分析圖形", instruction: "圖形下方是一個大半圓 (直徑20cm)。\n上方有兩個小半圓 (直徑10cm)，左邊凸出來，右邊凹進去。", subInstruction: "我們把它們分開來看。", action: "next", hint: "凹進去的線也是周長的一部分喔！", mode: "analyze" },
                    { title: "第二步：神奇的變化", instruction: "點擊「看動畫」，把凸出來的半圓移到右邊去", action: "animate_demo", hint: "平移過去後，剛好跟凹進去的半圓拼成一個完整的圓。", mode: "curve_observe" },
                    { title: "第三步：計算小圓周長", instruction: "太棒了！兩個小弧線剛好拼成一個直徑 10cm 的圓。\n\n請先算出這個小圓的周長。", subInstruction: `小圓直徑 ${p.D_SMALL}cm 的周長 = ?\n(圓周率用3.14計算)`, action: "input", correctAnswer: vals.smallCircle.toString(), validate: (val) => Math.abs(parseFloat(val) - vals.smallCircle) < 0.1, hint: `圓周長 = 直徑 × ${p.PI}`, mode: "curve_calc_small" },
                    { title: "第四步：計算大半圓弧長", instruction: "接著，我們算下方的大半圓 (直徑 20cm)。\n\n請算出它的弧長。", subInstruction: `直徑 ${p.D_BIG}cm 的半圓弧長 = ?\n(圓周率用3.14計算)`, action: "input", correctAnswer: vals.bigArc.toString(), validate: (val) => Math.abs(parseFloat(val) - vals.bigArc) < 0.1, hint: `半圓弧長 = 直徑 × ${p.PI} ÷ 2`, mode: "curve_calc_big" },
                    { title: "第五步：計算總周長", instruction: "最後，把剛剛算出來的兩個答案加起來。\n\n總周長是多少呢？", subInstruction: `大半圓(${vals.bigArc}) + 小圓(${vals.smallCircle}) = ?`, action: "input", correctAnswer: vals.total.toString(), validate: (val) => Math.abs(parseFloat(val) - vals.total) < 0.1, hint: `把剛剛算出來的小圓周長，加上大半圓弧長。`, mode: "curve_calc_total" },
                    { title: "恭喜完成！", instruction: "", action: "reset", mode: "trace" }
                ]
            }
        ];

        const PerimeterTutor = () => {
          const [currentProbId, setCurrentProbId] = useState(0);
          const [step, setStep] = useState(0);
          const [feedback, setFeedback] = useState("");
          const [inputValue, setInputValue] = useState("");
          const [showHint, setShowHint] = useState(false);
          const [animState, setAnimState] = useState("none"); 
          const [isAnimDone, setIsAnimDone] = useState(false);
          const inputRef = useRef(null);

          const currentProb = PROBLEMS[currentProbId];
          const vals = currentProb.getValues(currentProb.params);
          const steps = currentProb.steps(vals, currentProb.params);
          const currentStep = steps[step];

          useEffect(() => {
            setInputValue("");
            setFeedback("");
            setShowHint(false);
            setIsAnimDone(false);
            const mode = currentStep.mode;
            
            // Focus input if mode is input
            if (currentStep.action === 'input' && inputRef.current) {
                setTimeout(() => inputRef.current.focus(), 100);
            }

            if (mode === "trace") setAnimState("trace");
            else if (mode === "straight") setAnimState("straight");
            else if (mode === "analyze") setAnimState("analyze");
            else if (mode === "curve_observe") setAnimState("none"); 
            else if (mode === "curve_calc") setAnimState("curve_done");
            else if (mode === "curve_calc_small") setAnimState("trace_small");
            else if (mode === "curve_calc_big") setAnimState("trace_big");
            else if (mode === "curve_calc_total") setAnimState("trace"); 
            else if (mode === "total") setAnimState("trace");
          }, [step, currentProbId]);

          const handleTabChange = (id) => { setCurrentProbId(id); setStep(0); setAnimState("trace"); }
          const handleNext = () => setStep(prev => Math.min(prev + 1, steps.length - 1));
          const handleReset = () => setStep(0);
          
          const checkAnswer = () => {
            if (!inputValue) return;
            const val = parseFloat(inputValue);
            // Allow small float error
            const correct = currentStep.validate ? currentStep.validate(inputValue) : Math.abs(val - parseFloat(currentStep.correctAnswer)) < 0.1;
            setFeedback(correct ? "correct" : "incorrect");
          };

          const renderQ1 = () => {
              const shapePath = `M 50,310 L 50,150 A 100,100 0 0,1 250,150 L 250,310 A 100,100 0 0,0 50,310 Z`;
              const mergeCurves = animState === "curve_demo" || animState === "curve_done" || animState === "trace_small" || animState === "trace_big";
              const showTrace = animState === "trace";
              const highlightStraight = animState === "straight" || animState === "total";
              
              return (
                <svg viewBox="0 0 350 400" className="w-full h-full drop-shadow-md">
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1"/></pattern>
                        <linearGradient id="q1Grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#dbeafe" /><stop offset="100%" stopColor="#bfdbfe" /></linearGradient>
                    </defs>
                    <rect width="350" height="400" fill="url(#grid)" opacity="0.4" />
                    <g transform="translate(25, 0)">
                        <path d={shapePath} fill="url(#q1Grad)" stroke="none" />
                        <line x1="50" y1="150" x2="250" y2="150" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />
                        <line x1="50" y1="310" x2="250" y2="310" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />
                        <g style={{ opacity: highlightStraight ? 1 : 0.1, transition: 'opacity 0.5s' }}>
                            <line x1="50" y1="310" x2="50" y2="150" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                            <line x1="250" y1="310" x2="250" y2="150" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" />
                            <text x="260" y="230" className="text-xl font-bold fill-red-500 select-none">16cm</text>
                        </g>
                        <g style={{ opacity: (currentStep.mode.includes('curve') || animState === 'trace' || step===4) ? 1 : 0.1, transition: 'opacity 0.5s' }}>
                            <path d="M 50,150 A 100,100 0 0,1 250,150" fill="none" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" />
                            <path d="M 250,310 A 100,100 0 0,0 50,310" fill="none" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" style={{ opacity: mergeCurves ? 0 : 1, transition: 'opacity 0.3s' }} />
                        </g>
                        <path d="M 250,310 A 100,100 0 0,0 50,310" fill="none" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" strokeDasharray="10,5" className="transition-all duration-1000 ease-in-out" style={{ transform: mergeCurves ? 'translateY(-160px) rotate(180deg)' : 'translateY(0px) rotate(0deg)', transformOrigin: '150px 310px', opacity: mergeCurves ? 1 : 0 }} />
                         <g style={{ opacity: mergeCurves ? 1 : 0, transition: 'opacity 0.5s 0.5s' }}><text x="150" y="230" textAnchor="middle" className="text-sm font-bold fill-blue-600 bg-white select-none">拼成一個圓！</text></g>
                        {showTrace && (
                            <>
                                <path d={shapePath} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" strokeDasharray="15, 10" className="animate-dash-move" />
                                <circle r="6" fill="#ef4444"><animateMotion dur="4s" repeatCount="indefinite" path={shapePath} rotate="auto" /></circle>
                            </>
                        )}
                        <line x1="50" y1="350" x2="250" y2="350" stroke="#64748b" strokeWidth="1" />
                        <line x1="50" y1="345" x2="50" y2="355" stroke="#64748b" strokeWidth="1" />
                        <line x1="250" y1="345" x2="250" y2="355" stroke="#64748b" strokeWidth="1" />
                        <text x="150" y="375" textAnchor="middle" className="text-lg font-bold fill-slate-600 select-none">20cm</text>
                    </g>
                </svg>
              );
          };

          const renderQ2 = () => {
              const mergeCurves = animState === "curve_demo" || animState === "curve_done" || animState === "trace_small" || animState === "trace_big";
              const showTrace = animState === "trace";
              const highlightCurves = animState === "analyze" || currentStep.mode.includes('curve') || animState === "trace";

              const pathTL = `M 75,175 A 100,100 0 0,1 175,75`; 
              const pathTR = `M 175,75 A 100,100 0 0,0 275,175`; 
              const pathBR = `M 275,175 A 100,100 0 0,1 175,275`; 
              const pathBL = `M 175,275 A 100,100 0 0,0 75,175`; 

              const fullShapeClean = `M 75,175 A 100,100 0 0,1 175,75 A 100,100 0 0,0 275,175 A 100,100 0 0,1 175,275 A 100,100 0 0,0 75,175 Z`;
              
              const ghostCircle = `M 175,175 m -100,0 a 100,100 0 1,0 200,0 a 100,100 0 1,0 -200,0`;

              return (
                <svg viewBox="0 0 350 400" className="w-full h-full drop-shadow-md">
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1"/></pattern>
                        <linearGradient id="q2Grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#fed7aa" /><stop offset="100%" stopColor="#fb923c" /></linearGradient>
                    </defs>
                    <rect width="350" height="400" fill="url(#grid)" opacity="0.4" />
                    
                    <rect x="75" y="75" width="200" height="200" fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />
                    <path d={ghostCircle} fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="6,4" style={{ opacity: mergeCurves ? 1 : 0, transition: 'opacity 1s' }} />
                    <path d={fullShapeClean} fill="url(#q2Grad)" stroke="none" style={{ opacity: 1 }} />

                    <line x1="175" y1="75" x2="175" y2="275" stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,4" />
                    <line x1="75" y1="175" x2="275" y2="175" stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,4" />

                    <g style={{ transform: mergeCurves ? 'rotate(180deg)' : 'rotate(0deg)', transformOrigin: '225px 125px', transition: 'transform 1.5s ease-in-out' }}>
                        <path d={pathTR} fill="none" stroke="#3b82f6" strokeWidth={highlightCurves ? 6 : 0} strokeLinecap="round" />
                    </g>
                    <g style={{ transform: mergeCurves ? 'rotate(180deg)' : 'rotate(0deg)', transformOrigin: '125px 225px', transition: 'transform 1.5s ease-in-out' }}>
                        <path d={pathBL} fill="none" stroke="#3b82f6" strokeWidth={highlightCurves ? 6 : 0} strokeLinecap="round" />
                    </g>
                    <path d={pathTL} fill="none" stroke="#3b82f6" strokeWidth={highlightCurves ? 6 : 0} strokeLinecap="round" />
                    <path d={pathBR} fill="none" stroke="#3b82f6" strokeWidth={highlightCurves ? 6 : 0} strokeLinecap="round" />
                    
                    <g style={{ opacity: mergeCurves ? 1 : 0, transition: 'opacity 0.5s 1.5s' }}>
                        <text x="175" y="175" textAnchor="middle" dominantBaseline="middle" className="text-xl font-bold fill-blue-600 select-none bg-white/50 px-2">線條變成圓了！</text>
                    </g>

                    {showTrace && (
                        <>
                            <path d={fullShapeClean} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" strokeDasharray="15, 10" className="animate-dash-move" />
                            <circle r="6" fill="#ef4444"><animateMotion dur="6s" repeatCount="indefinite" path={fullShapeClean} /></circle>
                        </>
                    )}

                    <text x="175" y="60" textAnchor="middle" className="text-xl font-bold fill-slate-600 select-none">30cm</text>
                    <text x="290" y="175" textAnchor="middle" className="text-xl font-bold fill-slate-600 select-none" style={{writingMode: 'vertical-rl'}}>30cm</text>
                </svg>
              );
          };

          // Q3 Render (Yin-Yang / Paisley Shape)
          const renderQ3 = () => {
              const mergeCurves = animState === "curve_demo" || animState === "curve_done" || animState === "trace_small" || animState === "trace_big";
              const showTrace = animState === "trace";
              const showTraceSmall = animState === "trace_small";
              const showTraceBig = animState === "trace_big";
              
              const pathFull = `M 75,200 A 50,50 0 0,1 175,200 A 50,50 0 0,0 275,200 A 100,100 0 0,1 75,200 Z`;
              const pathBig = `M 275,200 A 100,100 0 0,1 75,200`; 
              const pathSmallLeft = `M 75,200 A 50,50 0 0,1 175,200`; // Convex/Up
              const pathSmallRight = `M 175,200 A 50,50 0 0,0 275,200`; // Concave/Down

              const tracePathSmall = `M 175,200 A 50,50 0 0,0 275,200 A 50,50 0 0,0 175,200`;
              
              return (
                <svg viewBox="0 0 350 400" className="w-full h-full drop-shadow-md">
                    <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="1"/></pattern>
                        <linearGradient id="q3Grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor="#d9f99d" /><stop offset="100%" stopColor="#bef264" /></linearGradient>
                    </defs>
                    <rect width="350" height="400" fill="url(#grid)" opacity="0.4" />
                    
                    {/* Centers */}
                    <circle cx="125" cy="200" r="3" fill="#64748b" />
                    <circle cx="225" cy="200" r="3" fill="#64748b" />

                    {/* The Fill Shape (Static) */}
                    <path d={pathFull} fill="url(#q3Grad)" stroke="none" />

                    {/* Big Arc (Stroke) */}
                    <path d={pathBig} fill="none" stroke="#3b82f6" strokeWidth={6} strokeLinecap="round" />
                    
                    {/* Small Right Arc (Stroke) - Static Concave (Down) */}
                    <path d={pathSmallRight} fill="none" stroke="#3b82f6" strokeWidth={6} strokeLinecap="round" />
                    
                    {/* Small Left Arc (Animated) - Convex (Up) */}
                    {/* Translate +100px to join the right arc */}
                    <g style={{ 
                        transform: mergeCurves ? 'translateX(100px)' : 'translateX(0px)', 
                        transition: 'transform 1.5s ease-in-out'
                    }}>
                         <path d={pathSmallLeft} fill="none" stroke="#3b82f6" strokeWidth={6} strokeLinecap="round" />
                    </g>
                    
                    {/* Ghost Line showing where it was */}
                    <path d={pathSmallLeft} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" style={{ opacity: mergeCurves ? 0.5 : 0 }} />

                     <g style={{ opacity: mergeCurves ? 1 : 0, transition: 'opacity 0.5s 1.5s' }}><text x="225" y="280" textAnchor="middle" className="text-sm font-bold fill-blue-600 bg-white select-none">拼成一個圓！</text></g>

                    {/* Trace Animation: Full Shape */}
                    {showTrace && (
                        <>
                            <path d={pathFull} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" strokeDasharray="15, 10" className="animate-dash-move" />
                            <circle r="6" fill="#ef4444"><animateMotion dur="6s" repeatCount="indefinite" path={pathFull} /></circle>
                        </>
                    )}

                    {/* Trace Animation: Small Circle Calculation (FULL CIRCLE at RIGHT) */}
                    {showTraceSmall && (
                        <>
                            <path d={tracePathSmall} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" strokeDasharray="15, 10" className="animate-dash-move" />
                            <circle r="6" fill="#ef4444"><animateMotion dur="2s" repeatCount="indefinite" path={tracePathSmall} /></circle>
                        </>
                    )}

                    {/* Trace Animation: Big Arc Calculation */}
                    {showTraceBig && (
                        <>
                            <path d={pathBig} fill="none" stroke="#ef4444" strokeWidth="4" strokeLinecap="round" strokeDasharray="15, 10" className="animate-dash-move" />
                            <circle r="6" fill="#ef4444"><animateMotion dur="4s" repeatCount="indefinite" path={pathBig} /></circle>
                        </>
                    )}

                    {/* Dashed Diameter Line - Moved to bottom to be on top */}
                    <line x1="50" y1="200" x2="300" y2="200" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />

                    {/* Vertical Helper Lines for segments */}
                    <line x1="75" y1="180" x2="75" y2="220" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />
                    <line x1="175" y1="180" x2="175" y2="220" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />
                    <line x1="275" y1="180" x2="275" y2="220" stroke="#94a3b8" strokeWidth="2" strokeDasharray="4,4" />

                    {/* Dimension Text Only (Moved up, brackets removed) */}
                    {/* Left 10cm */}
                    <text x="125" y="215" textAnchor="middle" className="text-sm font-bold fill-slate-500 bg-white/50 px-1">10cm</text>

                    {/* Right 10cm */}
                    <text x="225" y="215" textAnchor="middle" className="text-sm font-bold fill-slate-500 bg-white/50 px-1">10cm</text>

                </svg>
              );
          }

          return (
            <div className="flex flex-col items-center min-h-screen p-4 font-sans bg-gray-50">
              <div className="w-full max-w-5xl flex gap-2 mb-4">
                  {PROBLEMS.map(p => (
                      <button key={p.id} onClick={() => handleTabChange(p.id)} className={`flex-1 py-3 px-6 rounded-xl font-bold text-lg transition-all shadow-sm ${currentProbId === p.id ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'bg-white text-gray-500 hover:bg-indigo-50'}`}>
                          {p.name}
                      </button>
                  ))}
              </div>
              <div className="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border-4 border-white min-h-[500px]">
                <div className="w-full md:w-1/2 bg-slate-50 p-6 flex flex-col items-center justify-center border-r border-slate-200 relative overflow-hidden">
                  <div className="absolute top-4 left-4 bg-white/80 backdrop-blur px-3 py-1 rounded-full text-slate-500 font-bold text-sm flex items-center gap-2 shadow-sm z-10"><Calculator className="w-4 h-4" /> 互動教學板</div>
                  <div className="relative w-full max-w-[350px] aspect-[3.5/4] select-none">
                      {currentProbId === 0 && renderQ1()}
                      {currentProbId === 1 && renderQ2()}
                      {currentProbId === 2 && renderQ3()}
                  </div>
                  <div className="mt-2 bg-yellow-50 border border-yellow-200 p-3 rounded-lg text-xs text-yellow-800 flex gap-2 max-w-[90%]"><HelpCircle className="w-4 h-4 flex-shrink-0" /><span>小提示：圓周率我們使用 3.14 來計算喔！</span></div>
                </div>
                <div className="w-full md:w-1/2 p-8 flex flex-col relative bg-white">
                  <div className="flex gap-2 mb-8 justify-center">{steps.map((s, idx) => (<div key={idx} className={`h-2 rounded-full transition-all duration-300 ${idx === step ? 'w-8 bg-indigo-600' : 'w-2 bg-indigo-100'}`} />))}</div>
                  <div className="flex-1 flex flex-col justify-center">
                    <h1 className="text-2xl font-extrabold text-slate-800 mb-4">{currentStep.title}</h1>
                    <div className="text-lg text-slate-600 mb-8 leading-relaxed font-medium whitespace-pre-line">{currentStep.instruction}</div>
                    <div className="min-h-[160px]">
                      {currentStep.action === 'next' && (
                        <button onClick={handleNext} className="w-full group bg-indigo-600 hover:bg-indigo-700 text-white text-xl py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-indigo-200 flex items-center justify-center gap-3"><Play className="w-6 h-6 fill-current group-hover:scale-110 transition-transform" /> 開始學習</button>
                      )}
                      {currentStep.action === 'animate_demo' && (
                        !isAnimDone ? (
                            <button onClick={() => { 
                                setAnimState("curve_demo"); 
                                setTimeout(() => { 
                                    setAnimState("curve_done"); 
                                    setIsAnimDone(true); 
                                }, 2000); 
                            }} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-xl py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-blue-200 flex items-center justify-center gap-3 animate-pulse">
                                <Move className="w-6 h-6" /> 看動畫 (變形)
                            </button>
                        ) : (
                            <button onClick={handleNext} className="w-full bg-green-600 hover:bg-green-700 text-white text-xl py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-green-200 flex items-center justify-center gap-3 animate-bounce-short">
                                下一步 <ArrowRight className="w-6 h-6" />
                            </button>
                        )
                      )}
                      {currentStep.action === 'input' && (
                        <div className="space-y-6 animate-fade-in-up">
                          <div className="bg-slate-50 border-2 border-indigo-100 p-6 rounded-2xl">
                            <p className="font-bold text-indigo-900 mb-2 text-sm uppercase tracking-wider">計算題</p>
                            <p className="text-xl text-slate-700 font-mono mb-4 whitespace-pre-line text-center">{currentStep.subInstruction}</p>
                            
                            {/* Input Area with Unit Integration */}
                            <div className="flex gap-3 items-stretch">
                                <div className="relative flex-1 group">
                                    <input 
                                        ref={inputRef}
                                        type="number" 
                                        value={inputValue} 
                                        onChange={(e) => { setInputValue(e.target.value); setFeedback(""); }} 
                                        placeholder="輸入答案..." 
                                        className="w-full h-full border-2 border-slate-200 rounded-xl pl-5 pr-14 py-3 text-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 text-right font-bold text-slate-700 transition-all placeholder:text-slate-300 placeholder:text-base placeholder:font-normal" 
                                        onKeyDown={(e) => e.key === 'Enter' && checkAnswer()} 
                                    />
                                    <div className="absolute right-0 top-0 bottom-0 flex items-center px-4 bg-slate-100 rounded-r-xl border-l border-slate-200 text-slate-500 font-bold select-none pointer-events-none group-focus-within:bg-indigo-50 group-focus-within:text-indigo-600 transition-colors">
                                        cm
                                    </div>
                                </div>
                                <button onClick={checkAnswer} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 rounded-xl font-bold text-lg shadow-md transition-colors whitespace-nowrap">檢查</button>
                            </div>

                          </div>
                          {feedback === 'correct' && (
                            <div className="bg-green-100 text-green-800 p-4 rounded-xl flex items-center gap-4 animate-bounce-short border border-green-200 shadow-sm">
                                <div className="bg-green-500 text-white p-1 rounded-full"><Check className="w-5 h-5" /></div>
                                <div>
                                    <p className="text-xs text-green-600 font-bold uppercase">Great Job</p>
                                    <span className="font-bold text-lg">完全正確！答案是 {inputValue} cm</span>
                                </div>
                                <button onClick={handleNext} className="ml-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-sm flex items-center gap-1 shadow-sm transition-transform hover:scale-105">下一步 <ArrowRight className="w-4 h-4" /></button>
                            </div>
                          )}
                          {feedback === 'incorrect' && (
                            <div className="bg-red-50 text-red-800 p-4 rounded-xl flex items-center gap-4 animate-shake border border-red-100 shadow-sm">
                                <div>
                                    <p className="font-bold">答案不太對喔...</p>
                                    <p className="text-sm opacity-80">{currentStep.hint ? '不妨參考一下提示看看！' : '再試一次看看！'}</p>
                                </div>
                                <button onClick={() => setShowHint(true)} className="ml-auto text-sm font-bold underline hover:text-red-900 bg-white/50 px-3 py-1 rounded">看提示</button>
                            </div>
                          )}
                        </div>
                      )}
                      {currentStep.action === 'reset' && (
                        <div className="text-center py-4"><div className="inline-block p-4 bg-green-100 rounded-full mb-4"><Check className="w-12 h-12 text-green-600" /></div><h3 className="text-2xl font-bold text-slate-800 mb-2">太厲害了！</h3><p className="text-slate-600 mb-8">你已經學會了這一題的算法。</p><button onClick={handleReset} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-full font-bold shadow-lg flex items-center justify-center gap-2 mx-auto"><RotateCcw className="w-5 h-5" /> 再玩一次</button></div>
                      )}
                    </div>
                  </div>
                  {showHint && currentStep.hint && (<div className="absolute bottom-24 left-8 right-8 bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded shadow-lg animate-fade-in z-20"><div className="flex justify-between items-start"><p className="text-yellow-800 font-medium">{currentStep.hint}</p><button onClick={() => setShowHint(false)} className="text-yellow-600 hover:text-yellow-800 font-bold px-2">✕</button></div></div>)}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PerimeterTutor />);
    </script>
</body>
</html>
