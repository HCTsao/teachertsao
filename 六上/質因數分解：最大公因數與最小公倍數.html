<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質因數分解：最大公因數與最小公倍數</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .factor-btn.selected {
            background-color: #fbbf24 !important; /* amber-400 */
            border-color: #d97706 !important; /* amber-600 */
            color: white !important;
            transform: scale(1.15);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .timer-warning {
            color: #ef4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="game-card" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-b-8 border-indigo-200">
        
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">質因數分解大挑戰</h1>
                <p class="text-indigo-100 opacity-90">最大公因數與最小公倍數</p>
            </div>
            <div class="flex flex-col items-end gap-1">
                <div id="timer-display" class="bg-white text-indigo-700 px-4 py-1 rounded-full font-bold text-sm">
                    剩餘時間: 60s
                </div>
                <div id="score-display" class="bg-indigo-700 px-4 py-1 rounded-full font-bold text-sm">
                    目前積分: 0
                </div>
            </div>
        </div>

        <div id="game-content" class="p-8">
            <!-- Start Screen -->
            <div id="start-screen" class="text-center space-y-6">
                <div class="bg-indigo-50 p-6 rounded-2xl text-left border-l-4 border-indigo-400">
                    <h2 class="text-lg font-bold text-indigo-800 mb-2">學習目標</h2>
                    <ul class="space-y-2 text-slate-600">
                        <li>1. 從質因數分解式中找出「共同的質因數」。</li>
                        <li>2. 將共同的質因數相乘，即為「最大公因數」。</li>
                        <li>3. 共同的質因數與非共同的因數相乘，即為「最小公倍數」。</li>
                    </ul>
                </div>
                <button onclick="startGame()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg text-xl transform hover:scale-[1.02]">
                    開始挑戰
                </button>
            </div>

            <!-- Problem Screen -->
            <div id="problem-screen" class="hidden space-y-8">
                <div class="space-y-6">
                    <div class="flex flex-col gap-6">
                        <div class="flex items-center gap-4">
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md font-bold text-sm whitespace-nowrap">數字 A</span>
                            <div id="factors-a-container" class="flex flex-wrap items-center gap-2"></div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-md font-bold text-sm whitespace-nowrap">數字 B</span>
                            <div id="factors-b-container" class="flex flex-wrap items-center gap-2"></div>
                        </div>
                    </div>
                </div>

                <div class="border-t pt-6">
                    <div id="step1-controls" class="text-center space-y-4">
                        <p class="text-slate-600 font-medium italic">請點選上方雙方「共同的質因數」</p>
                        <button onclick="checkStep1()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-2 rounded-lg font-bold shadow-md">
                            圈好了，下一步
                        </button>
                    </div>

                    <div id="step2-controls" class="hidden space-y-4 bg-slate-50 p-6 rounded-2xl border-2 border-indigo-100">
                        <div class="grid grid-cols-1 gap-6">
                            <div class="space-y-2">
                                <label class="block text-sm font-bold text-slate-700">最大公因數</label>
                                <input id="input-hcf" type="text" placeholder="例如: 2x2" class="w-full p-4 rounded-xl border-2 border-blue-200 focus:border-blue-500 outline-none text-center font-mono text-xl shadow-inner bg-white">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-sm font-bold text-slate-700">最小公倍數</label>
                                <input id="input-lcm" type="text" placeholder="例如: 2x2x3x7" class="w-full p-4 rounded-xl border-2 border-purple-200 focus:border-purple-500 outline-none text-center font-mono text-xl shadow-inner bg-white">
                            </div>
                        </div>
                        <button onclick="checkFinal()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg mt-4 text-lg">
                            檢查答案
                        </button>
                    </div>

                    <div id="feedback-controls" class="hidden text-center space-y-4">
                        <div id="feedback-msg" class="p-4 rounded-xl font-bold text-lg"></div>
                        <div class="bg-slate-50 p-6 rounded-2xl text-left space-y-3 border border-slate-200">
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">正確答案：</p>
                            <p class="text-slate-700">最大公因數：<span id="correct-hcf" class="font-mono font-bold text-blue-600"></span></p>
                            <p class="text-slate-700">最小公倍數：<span id="correct-lcm" class="font-mono font-bold text-purple-600"></span></p>
                        </div>
                        <button onclick="generateProblem()" class="w-full bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-xl font-bold shadow-xl">
                            下一題
                        </button>
                    </div>

                    <p id="error-message" class="text-center mt-4 text-rose-500 font-bold hidden"></p>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="end-screen" class="hidden text-center space-y-6 animate-in zoom-in-95 duration-300">
                <div class="py-8">
                    <h2 class="text-4xl font-bold text-indigo-600 mb-2">時間到！</h2>
                    <p class="text-xl text-slate-600">最終得分</p>
                    <div id="final-score" class="text-6xl font-black text-amber-500 my-4">0</div>
                </div>
                <button onclick="startGame()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg text-xl">
                    再玩一次
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentProblem = null;
        let selectedA = [];
        let selectedB = [];
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval = null;

        const primes = [2, 3, 5, 7];

        function startGame() {
            score = 0;
            timeLeft = 60;
            gameActive = true;
            document.getElementById('score-display').innerText = `目前積分: ${score}`;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('problem-screen').classList.remove('hidden');
            
            startTimer();
            generateProblem();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            display.innerText = `剩餘時間: ${timeLeft}s`;
            if (timeLeft <= 10) {
                display.classList.add('timer-warning');
            } else {
                display.classList.remove('timer-warning');
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('problem-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        function generateProblem() {
            if (!gameActive) return;
            
            let factorsA, factorsB, commonFactors, uniqueA, uniqueB;

            while (true) {
                const commonCount = Math.floor(Math.random() * 2) + 2; 
                commonFactors = [];
                for(let i=0; i<commonCount; i++) {
                    commonFactors.push(primes[Math.floor(Math.random() * primes.length)]);
                }

                uniqueA = [primes[Math.floor(Math.random() * primes.length)]];
                uniqueB = [primes[Math.floor(Math.random() * primes.length)]];

                factorsA = [...commonFactors, ...uniqueA].sort((a, b) => a - b);
                factorsB = [...commonFactors, ...uniqueB].sort((a, b) => a - b);

                if (JSON.stringify(factorsA) !== JSON.stringify(factorsB)) break;
            }

            currentProblem = {
                factorsA,
                factorsB,
                commonFactors: commonFactors.sort((a, b) => a - b),
                hcfAns: commonFactors.sort((a, b) => a - b).join('x'),
                lcmAns: [...commonFactors, ...uniqueA, ...uniqueB].sort((a, b) => a - b).join('x')
            };

            selectedA = [];
            selectedB = [];
            renderFactors();
            
            document.getElementById('step1-controls').classList.remove('hidden');
            document.getElementById('step2-controls').classList.add('hidden');
            document.getElementById('feedback-controls').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('input-hcf').value = '';
            document.getElementById('input-lcm').value = '';
        }

        function renderFactors() {
            const containerA = document.getElementById('factors-a-container');
            const containerB = document.getElementById('factors-b-container');
            containerA.innerHTML = '';
            containerB.innerHTML = '';

            currentProblem.factorsA.forEach((f, i) => {
                const btn = createFactorBtn(f, i, 'A');
                containerA.appendChild(btn);
                if (i < currentProblem.factorsA.length - 1) {
                    const x = document.createElement('span');
                    x.innerText = 'x';
                    x.className = 'text-slate-400 font-bold px-1';
                    containerA.appendChild(x);
                }
            });

            currentProblem.factorsB.forEach((f, i) => {
                const btn = createFactorBtn(f, i, 'B');
                containerB.appendChild(btn);
                if (i < currentProblem.factorsB.length - 1) {
                    const x = document.createElement('span');
                    x.innerText = 'x';
                    x.className = 'text-slate-400 font-bold px-1';
                    containerB.appendChild(x);
                }
            });
        }

        function createFactorBtn(val, idx, type) {
            const btn = document.createElement('button');
            btn.innerText = val;
            btn.className = 'factor-btn w-10 h-10 rounded-full border-2 border-slate-200 font-bold text-slate-600 transition-all flex items-center justify-center bg-white hover:border-amber-300 cursor-pointer touch-manipulation';
            btn.onclick = () => toggleFactor(idx, type, btn);
            return btn;
        }

        function toggleFactor(idx, type, btn) {
            if (type === 'A') {
                if (selectedA.includes(idx)) {
                    selectedA = selectedA.filter(i => i !== idx);
                    btn.classList.remove('selected');
                } else {
                    selectedA.push(idx);
                    btn.classList.add('selected');
                }
            } else {
                if (selectedB.includes(idx)) {
                    selectedB = selectedB.filter(i => i !== idx);
                    btn.classList.remove('selected');
                } else {
                    selectedB.push(idx);
                    btn.classList.add('selected');
                }
            }
        }

        function checkStep1() {
            if (selectedA.length === 0 || selectedB.length === 0) {
                showError('請先圈出共同的質因數喔！');
                return;
            }

            const curA = selectedA.map(i => currentProblem.factorsA[i]).sort().join(',');
            const curB = selectedB.map(i => currentProblem.factorsB[i]).sort().join(',');
            const target = [...currentProblem.commonFactors].sort().join(',');

            if (curA === target && curB === target) {
                document.getElementById('step1-controls').classList.add('hidden');
                document.getElementById('step2-controls').classList.remove('hidden');
                document.getElementById('error-message').classList.add('hidden');
                document.querySelectorAll('.factor-btn').forEach(b => {
                    b.onclick = null;
                    b.style.cursor = 'default';
                });
            } else {
                showError('再檢查看看，圈出的數字要剛好是共同擁有的喔！');
            }
        }

        function checkFinal() {
            const hcfVal = document.getElementById('input-hcf').value;
            const lcmVal = document.getElementById('input-lcm').value;

            if (!hcfVal || !lcmVal) {
                showError('請輸入分解式！');
                return;
            }

            const userHcf = normalize(hcfVal);
            const userLcm = normalize(lcmVal);
            const sortF = (s) => s.split('x').sort().join('x');
            const isHcfOk = sortF(userHcf) === sortF(normalize(currentProblem.hcfAns));
            const isLcmOk = sortF(userLcm) === sortF(normalize(currentProblem.lcmAns));

            if (isHcfOk && isLcmOk) {
                score += 10;
                document.getElementById('score-display').innerText = `目前積分: ${score}`;
                showFeedback(true, '完全正確！');
            } else {
                showFeedback(false, '分解式寫錯了，再接再厲！');
            }
        }

        function normalize(s) {
            return s.toLowerCase().replace(/\s/g, '').replace(/[\*xX]/g, 'x');
        }

        function showError(msg) {
            const err = document.getElementById('error-message');
            err.innerText = msg;
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 2000);
        }

        function showFeedback(isCorrect, msg) {
            document.getElementById('step2-controls').classList.add('hidden');
            document.getElementById('feedback-controls').classList.remove('hidden');
            
            const fMsg = document.getElementById('feedback-msg');
            fMsg.innerText = msg;
            fMsg.className = isCorrect ? 'p-4 rounded-xl font-bold text-lg bg-green-100 text-green-700' : 'p-4 rounded-xl font-bold text-lg bg-rose-100 text-rose-700';
            
            document.getElementById('correct-hcf').innerText = currentProblem.hcfAns;
            document.getElementById('correct-lcm').innerText = currentProblem.lcmAns;
        }
    </script>
</body>
</html>
