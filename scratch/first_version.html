    <!-- Web Audio Synthesized Sounds -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                // Happy ping-pong rising sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3); // A5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                // Buzz wrong sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.setValueAtTime(120, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'click') {
                // Soft click sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }
    </script>

    <!-- Game Logic -->
    <script>
        let mode = 'coin'; // 'coin' or 'block'
        let targetVal = 0;
        let currentCoins = { 100: 0, 10: 0, 1: 0 };
        let currentBlocks = { hundred: 0, ten: 0, one: 0 };

        const items = [
            { name: "機器人玩具", price: 135, icon: "🤖" },
            { name: "粉紅小恐龍", price: 168, icon: "🦖" },
            { name: "太空小飛機", price: 124, icon: "🚀" },
            { name: "美味巧克力蛋糕", price: 153, icon: "🍰" },
            { name: "神奇故事書", price: 182, icon: "📚" },
            { name: "彩色水彩筆", price: 119, icon: "🎨" },
            { name: "小熊布偶", price: 147, icon: "🧸" }
        ];

        // Init
        window.onload = () => {
            initGame();
        };

        // Switch modes
        document.getElementById('btn-coin-mode').addEventListener('click', () => {
            playSound('click');
            setMode('coin');
        });
        document.getElementById('btn-block-mode').addEventListener('click', () => {
            playSound('click');
            setMode('block');
        });

        function setMode(newMode) {
            mode = newMode;
            if (mode === 'coin') {
                document.getElementById('btn-coin-mode').className = "px-6 py-3 rounded-2xl font-bold text-lg shadow-md transition-all bg-amber-500 text-white border-2 border-amber-600 scale-105";
                document.getElementById('btn-block-mode').className = "px-6 py-3 rounded-2xl font-bold text-lg shadow-md transition-all bg-white text-amber-700 border-2 border-amber-300 hover:bg-amber-100";
                document.getElementById('coin-mode-area').classList.remove('hidden');
                document.getElementById('block-mode-area').classList.add('hidden');
            } else {
                document.getElementById('btn-block-mode').className = "px-6 py-3 rounded-2xl font-bold text-lg shadow-md transition-all bg-amber-500 text-white border-2 border-amber-600 scale-105";
                document.getElementById('btn-coin-mode').className = "px-6 py-3 rounded-2xl font-bold text-lg shadow-md transition-all bg-white text-amber-700 border-2 border-amber-300 hover:bg-amber-100";
                document.getElementById('block-mode-area').classList.remove('hidden');
                document.getElementById('coin-mode-area').classList.add('hidden');
            }
            initGame();
        }

        function initGame() {
            clearCoins();
            clearBlocks();
            
            if (mode === 'coin') {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                targetVal = randomItem.price;
                document.getElementById('shop-item-name').innerText = randomItem.name;
                document.getElementById('shop-item-icon').innerText = randomItem.icon;
                document.getElementById('target-price').innerText = targetVal;
                document.getElementById('feedback-text').innerHTML = `🐼 熊貓收銀員說：「這件 ${randomItem.name} 是 $${targetVal}，請給我剛好的錢喔！」`;
            } else {
                targetVal = Math.floor(Math.random() * 100) + 100; // 100 to 199
                document.getElementById('target-number').innerText = targetVal;
                document.getElementById('feedback-text').innerHTML = `🐼 請使用下方百格板、十條與個位積木，排出數字 ${targetVal}！`;
            }
        }

        // --- COIN MODE ACTIONS ---
        function addCoin(val) {
            playSound('click');
            currentCoins[val]++;
            renderCoins();
            checkAnswers();
        }

        function clearCoins() {
            currentCoins = { 100: 0, 10: 0, 1: 0 };
            renderCoins();
            checkAnswers();
        }

        function renderCoins() {
            const tray = document.getElementById('tray-coins');
            tray.innerHTML = '';
            
            const total = (currentCoins[100] * 100) + (currentCoins[10] * 10) + (currentCoins[1] * 1);
            document.getElementById('current-price').innerText = total;

            if (total === 0) {
                tray.innerHTML = `<p id="coins-placeholder" class="text-stone-400 text-sm mx-auto my-auto text-center">請點選下方錢幣放入盤中...</p>`;
                return;
            }

            // Render 100s
            for (let i = 0; i < currentCoins[100]; i++) {
                tray.innerHTML += `<div class="block-animate w-24 h-14 bg-red-100 rounded-md border-2 border-red-400 flex flex-col items-center justify-center font-bold text-red-700 text-xs shadow-md"><div>壹佰元</div><div class="text-[10px] text-red-500">100</div></div>`;
            }
            // Render 10s
            for (let i = 0; i < currentCoins[10]; i++) {
                tray.innerHTML += `<div class="block-animate w-12 h-12 bg-amber-100 rounded-full border-4 border-amber-400 flex items-center justify-center font-black text-amber-700 text-sm shadow-md">10</div>`;
            }
            // Render 1s
            for (let i = 0; i < currentCoins[1]; i++) {
                tray.innerHTML += `<div class="block-animate w-10 h-10 bg-yellow-50 rounded-full border-4 border-yellow-300 flex items-center justify-center font-black text-yellow-600 text-xs shadow-md">1</div>`;
            }
        }

        // --- BLOCK MODE ACTIONS ---
        function addBlock(type) {
            playSound('click');
            currentBlocks[type]++;
            renderBlocks();
            checkAnswers();
        }

        function clearBlocks() {
            currentBlocks = { hundred: 0, ten: 0, one: 0 };
            renderBlocks();
            checkAnswers();
        }

        function renderBlocks() {
            const group100 = document.getElementById('group-hundreds');
            const group10 = document.getElementById('group-tens');
            const group1 = document.getElementById('group-ones');
            
            group100.innerHTML = '';
            group10.innerHTML = '';
            group1.innerHTML = '';

            const total = (currentBlocks.hundred * 100) + (currentBlocks.ten * 10) + (currentBlocks.one * 1);
            document.getElementById('current-block-value').innerText = total;

            document.getElementById('num-hundreds').innerText = currentBlocks.hundred;
            document.getElementById('num-tens').innerText = currentBlocks.ten;
            document.getElementById('num-ones').innerText = currentBlocks.one;

            if (total === 0) {
                document.getElementById('blocks-placeholder').classList.remove('hidden');
                return;
            } else {
                document.getElementById('blocks-placeholder').classList.add('hidden');
            }

            // Render hundreds
            for (let i = 0; i < currentBlocks.hundred; i++) {
                let gridHTML = '<div class="block-animate w-12 h-12 bg-red-100 border border-red-400 grid grid-cols-10 grid-rows-10 p-[1px] gap-[1px] shadow-sm">';
                for(let j=0; j<10; j++) gridHTML += '<div class="bg-red-400/40 w-full h-full"></div>';
                gridHTML += '</div>';
                group100.innerHTML += gridHTML;
            }

            // Render tens
            for (let i = 0; i < currentBlocks.ten; i++) {
                group10.innerHTML += `
                    <div class="block-animate w-3 h-12 bg-amber-100 border border-amber-400 flex flex-col gap-[1px] p-[1px] shadow-sm">
                        <div class="bg-amber-400/40 w-full h-2"></div>
                        <div class="bg-amber-400/40 w-full h-2"></div>
                        <div class="bg-amber-400/40 w-full h-2"></div>
                        <div class="bg-amber-400/40 w-full h-2"></div>
                        <div class="bg-amber-400/40 w-full h-2"></div>
                    </div>
                `;
            }

            // Render ones
            for (let i = 0; i < currentBlocks.one; i++) {
                group1.innerHTML += `<div class="block-animate w-4 h-4 bg-yellow-100 border border-yellow-400 shadow-sm"></div>`;
            }
        }

        // --- COMMON CHECK ANSWER ---
        function checkAnswers() {
            let total = 0;
            if (mode === 'coin') {
                total = (currentCoins[100] * 100) + (currentCoins[10] * 10) + (currentCoins[1] * 1);
            } else {
                total = (currentBlocks.hundred * 100) + (currentBlocks.ten * 10) + (currentBlocks.one * 1);
            }

            const feedback = document.getElementById('feedback-text');
            if (total === targetVal) {
                playSound('correct');
                feedback.innerHTML = `🎉 🐼 <b>答對了！太厲害了！</b> 你放了剛好 <b>$${total}</b>！可以進行下一題囉！`;
                feedback.className = "text-lg font-bold text-green-700 flex items-center gap-2";
            } else if (total > targetVal) {
                feedback.innerHTML = `⚠️ 🐼 <b>太多錢囉！</b> 當前是 <b>$${total}</b>，多出了 <b>$${total - targetVal}</b>。請調整一下。`;
                feedback.className = "text-lg font-bold text-red-600 flex items-center gap-2";
            } else {
                if (total === 0) {
                    if (mode === 'coin') {
                        feedback.innerHTML = `🐼 熊貓收銀員說：「請付剛好 <b>$${targetVal}</b> 喔！」`;
                    } else {
                        feedback.innerHTML = `🐼 請使用下方積木排出數字 <b>${targetVal}</b> 喔！`;
                    }
                    feedback.className = "text-lg font-bold text-amber-900 flex items-center gap-2";
                } else {
                    feedback.innerHTML = `🪙 🐼 <b>還不夠喔！</b> 當前是 <b>$${total}</b>，還差 <b>$${targetVal - total}</b>。再加點錢吧！`;
                    feedback.className = "text-lg font-bold text-amber-800 flex items-center gap-2";
                }
            }
        }

        function nextQuestion() {
            playSound('click');
            initGame();
        }
    </script>
</body>
</html>
