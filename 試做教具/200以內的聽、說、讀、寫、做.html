            transition: all 0.3s ease;
        }
        .mic-active {
            animation: pulseMic 1.2s infinite alternate;
            background-color: #ef4444 !important;
            color: white !important;
        }
        @keyframes pulseMic {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            100% { transform: scale(1.15); box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }

        .item-animation {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

    <!-- Web Audio Synthesizer -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'click') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }
    </script>

        function selectMode(m) {
            mode = m;
            const coinBtn = document.getElementById('btn-coin-mode');
            const blockBtn = document.getElementById('btn-block-mode');
            if (mode === 'coin') {
                coinBtn.className = "px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all bg-amber-500 text-white border border-amber-600";
                blockBtn.className = "px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all bg-white text-amber-700 border border-amber-300 hover:bg-amber-100";
                
                document.getElementById('btn-txt-hundred').innerText = "+100元";
                document.getElementById('btn-txt-ten').innerText = "+10元";
                document.getElementById('btn-txt-one').innerText = "+1元";

                document.getElementById('img-btn-hundred').src = IMAGES.coin100;
                document.getElementById('img-btn-hundred').className = "w-16 h-8 object-contain";
                document.getElementById('img-btn-ten').src = IMAGES.coin10;
                document.getElementById('img-btn-ten').className = "w-10 h-10 object-contain";
                document.getElementById('img-btn-one').src = IMAGES.coin1;
                document.getElementById('img-btn-one').className = "w-8 h-8 object-contain";
            } else {
                blockBtn.className = "px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all bg-amber-500 text-white border border-amber-600";
                coinBtn.className = "px-5 py-2.5 rounded-xl font-bold text-sm shadow-md transition-all bg-white text-amber-700 border border-amber-300 hover:bg-amber-100";
                
                document.getElementById('btn-txt-hundred').innerText = "+百格板";

                document.getElementById('img-btn-one').src = IMAGES.block1;
                document.getElementById('img-btn-one').className = "w-6 h-6 object-contain";
            }
            clearWorkspace();
            renderWorkspace();
        }

        function initGame() {
            // Pick a random question type: 1, 2, 3, or 4
            questionType = Math.floor(Math.random() * 4) + 1;
            
            quantityVerified = false;
            speechVerified = false;
            
            // Clean inputs & panels

            document.getElementById('verify-quantity-div').classList.remove('hidden');
            document.getElementById('speech-check-div').classList.add('hidden');
            document.getElementById('speech-result-div').classList.add('hidden');
            document.getElementById('btn-audio-replay').classList.add('hidden');
            document.getElementById('target-display-card').classList.remove('hidden');
            document.getElementById('placement-buttons-div').classList.remove('hidden');
            document.getElementById('live-sum-display').classList.add('hidden');
            
            clearWorkspace();

            // Set tags
            const tag = document.getElementById('question-type-tag');
            if (questionType === 1) tag.innerText = "看商品做數";
            else if (questionType === 2) tag.innerText = "聽音做數";
            else if (questionType === 3) tag.innerText = "逆向數錢";
            else if (questionType === 4) tag.innerText = "位值合成";

            // Generate values
            if (questionType === 1) {
                // Type 1: Shopping
                const item = shoppingItems[Math.floor(Math.random() * shoppingItems.length)];
                targetValue = item.price;
                
                document.getElementById('problem-text').innerHTML = `🐼 熊貓收銀員說：「我想買這件 <b>${item.name} ${item.icon}</b>，價格是 <b>$${targetValue}</b>，請在定位版放上正確的數量吧！」`;
                document.getElementById('target-title').innerText = "商品價格";
                document.getElementById('target-value').innerText = targetValue;
            } 
            else if (questionType === 2) {
                // Type 2: Audio only (hide target display text)
                targetValue = Math.floor(Math.random() * 100) + 100; // 100 to 199
                
                document.getElementById('problem-text').innerHTML = `🐼 聽聲音挑戰！「請仔細聽播放的聲音，並在定位版排出對應的數量！」`;
                document.getElementById('target-display-card').classList.add('hidden');
                document.getElementById('btn-audio-replay').classList.remove('hidden');
                
                // Speak immediately
                setTimeout(() => { playAudioQuestion(targetValue); }, 500);
            } 
            else if (questionType === 3) {
                // Type 3: Reverse counting
                targetValue = Math.floor(Math.random() * 100) + 100; // 100 to 199
                
                // Pre-populate workspace
                placedHundreds = Math.floor(targetValue / 100);
                placedTens = Math.floor((targetValue % 100) / 10);
                placedOnes = targetValue % 10;
                renderWorkspace();

                document.getElementById('problem-text').innerHTML = `🐼 請仔細看定位版上的錢幣/積木，數一數這代表多少？並把阿拉伯數字寫在下面！`;
                document.getElementById('target-display-card').classList.add('hidden');
                
                // Hide adding controls and verify quantities button
                document.getElementById('placement-buttons-div').classList.add('hidden');
                document.getElementById('verify-quantity-div').classList.add('hidden');
                document.getElementById('live-sum-display').classList.add('hidden');
                
                // Show arabic numeral input
                document.getElementById('numeral-input-div').classList.remove('hidden');
                document.getElementById('input-arabic-ans').value = '';
                document.getElementById('input-arabic-ans').focus();
            } 
            else if (questionType === 4) {
                // Type 4: PV composition
                // We want units not exceeding 20 (e.g. 12 tens, 15 ones)
                // Let's generate a combination under 200
                const hundreds = Math.random() > 0.5 ? 1 : 0;
                let tens = 0;
                let ones = 0;
                
                if (hundreds === 0) {
                    tens = Math.floor(Math.random() * 8) + 11; // 11 to 18 tens -> 110 to 180
                    ones = Math.floor(Math.random() * 15) + 3;  // 3 to 17 ones
                } else {
                    tens = Math.floor(Math.random() * 8) + 2;   // 2 to 9 tens
                    ones = Math.floor(Math.random() * 12) + 3;  // 3 to 14 ones
                }
                
                targetValue = (hundreds * 100) + (tens * 10) + ones;
                
                // Safety check to keep under 200
                if (targetValue > 200) {
                    targetValue = 186;
                    tens = 12;
                    ones = 66; // wait, 12 tens = 120 + 66 = 186
                    ones = 6;
                    tens = 18;
                }

                // Construct text
                let text = "🐼 算一算，";
                if (hundreds > 0) text += `<b>${hundreds} 個百</b>、`;
                text += `<b>${tens} 個十</b>和<b>${ones} 個一</b>合起來是多少？請輸入答案！`;

                document.getElementById('problem-text').innerHTML = text;
                document.getElementById('target-display-card').classList.add('hidden');
                
                document.getElementById('placement-buttons-div').classList.add('hidden');
                document.getElementById('verify-quantity-div').classList.add('hidden');
                document.getElementById('live-sum-display').classList.add('hidden');
                
                document.getElementById('numeral-input-div').classList.remove('hidden');
                document.getElementById('input-arabic-ans').value = '';
                document.getElementById('input-arabic-ans').focus();
            }

            document.getElementById('feedback-text').innerText = "🐼 請先完成做數或回答數字，正確後才會開啟語音念法檢核喔！";
            document.getElementById('feedback-text').className = "text-md font-bold text-amber-900";
        }

        // Play audio TTS
        function playAudioQuestion(val) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const reading = getChineseStandardReading(val);
                const utter = new SpeechSynthesisUtterance("請排出：" + reading);
                utter.lang = 'zh-TW';
                utter.rate = 0.75; // child friendly slow rate
                window.speechSynthesis.speak(utter);
            }
        }

        function replayAudio() {
            playSound('click');
            playAudioQuestion(targetValue);
        }

        // Chinese converter
        function getChineseStandardReading(num) {
            const units = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
            const hundreds = Math.floor(num / 100);
            const tens = Math.floor((num % 100) / 10);
            const ones = num % 10;
            
            let str = "";
            if (hundreds > 0) {
                if (hundreds === 2) str += "兩百";
                else str += units[hundreds] + "百";
            }
            
            if (tens > 0) {
                if (tens === 1 && hundreds > 0) {
                    str += "一十"; // e.g. 115 -> 一百一十五
                } else {
                    str += units[tens] + "十";
                }
            } else if (hundreds > 0 && ones > 0) {
                str += "零";
            }
            
            if (ones > 0) {
                str += units[ones];
            }
            
            return str;
        }

        // Get list of acceptable speech inputs
        function getAcceptableReadings(num) {
            const list = [];
            const standard = getChineseStandardReading(num);
            list.push(standard);
            list.push(num.toString()); // E.g. "147"

            // Add variations
            const units = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
            const hundreds = Math.floor(num / 100);
            const tens = Math.floor((num % 100) / 10);
            const ones = num % 10;

            // Two-hundred variations
            if (hundreds === 2) {
                const alt = standard.replace("兩百", "二百");
                list.push(alt);
            }
            
            // Teen variations (e.g. 112 -> 一百一十二, or 一百十二)
            if (hundreds > 0 && tens === 1) {
                const alt = standard.replace("一百一十", "一百十");
                list.push(alt);
            }
            
            // Colloquial tens end (e.g. 140 -> 一百四十 or 一百四)
            if (hundreds > 0 && tens > 0 && ones === 0) {
                const alt = standard.replace("十", ""); // "一百四十" -> "一百四"
                list.push(alt);
            }

            return list;
        }

        // Workspace Actions
        function addItem(type) {
            playSound('click');
            if (type === 'hundred') placedHundreds++;
            else if (type === 'ten') placedTens++;
            else if (type === 'one') placedOnes++;
            
            renderWorkspace();
        }

        function clearWorkspace() {
            placedHundreds = 0;
            placedTens = 0;
            placedOnes = 0;
            renderWorkspace();
        }

        function removeItem(type, idx) {
            playSound('click');
            if (type === 'hundred') placedHundreds = Math.max(0, placedHundreds - 1);
            else if (type === 'ten') placedTens = Math.max(0, placedTens - 1);
            else if (type === 'one') placedOnes = Math.max(0, placedOnes - 1);
            
            renderWorkspace();
        }

        function renderWorkspace() {
            const colH = document.getElementById('col-hundreds');
            const colT = document.getElementById('col-tens');
            const colO = document.getElementById('col-ones');

            colH.innerHTML = '';
            colT.innerHTML = '';
            colO.innerHTML = '';

            document.getElementById('lbl-hundred-count').innerText = placedHundreds;
            document.getElementById('lbl-ten-count').innerText = placedTens;
            document.getElementById('lbl-one-count').innerText = placedOnes;

            // Calculate current placement value
            const sumVal = (placedHundreds * 100) + (placedTens * 10) + placedOnes;
            document.getElementById('live-sum-value').innerText = sumVal;

            // Render hundreds
            const imgHundred = mode === 'coin' ? 'images/100元.jpg' : 'images/base10_hundred.png';
            const sizeHundred = mode === 'coin' ? 'w-32 h-16 md:w-36 md:h-18' : 'w-24 h-24 md:w-28 md:h-28';
            for (let i = 0; i < placedHundreds; i++) {
                colH.innerHTML += `
                    <div class="relative item-animation select-none cursor-pointer" onclick="removeItem('hundred', ${i})">
                        <img src="${imgHundred}" class="${sizeHundred} object-contain border border-stone-200 rounded shadow-sm hover:scale-105" alt="百">
                        <span class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full text-[8px] w-3.5 h-3.5 flex items-center justify-center font-bold">×</span>
                    </div>
                `;
            }

            // Render tens
            const imgTen = mode === 'coin' ? 'images/10元.jpg' : 'images/base10_ten.png';
            const sizeTen = mode === 'coin' ? 'w-14 h-14 md:w-16 md:h-16' : 'w-8 h-24 md:w-10 md:h-28';
            for (let i = 0; i < placedTens; i++) {
                colT.innerHTML += `
                    <div class="relative item-animation select-none cursor-pointer" onclick="removeItem('ten', ${i})">
                        <img src="${imgTen}" class="${sizeTen} object-contain hover:scale-105" alt="十">
                        <span class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full text-[8px] w-3.5 h-3.5 flex items-center justify-center font-bold">×</span>
                    </div>
                `;
            }

            // Render ones
            const imgOne = mode === 'coin' ? 'images/1元.jpg' : 'images/base10_one.png';
            const sizeOne = mode === 'coin' ? 'w-10 h-10 md:w-12 md:h-12' : 'w-6 h-6 md:w-8 md:h-8';
            for (let i = 0; i < placedOnes; i++) {
                colO.innerHTML += `
                    <div class="relative item-animation select-none cursor-pointer" onclick="removeItem('one', ${i})">
                        <img src="${imgOne}" class="${sizeOne} object-contain hover:scale-105" alt="一">
                        <span class="absolute -top-1 -right-1 bg-red-600 text-white rounded-full text-[8px] w-3.5 h-3.5 flex items-center justify-center font-bold">×</span>
                    </div>
                `;
            }
        }

        // Verify Arabic numeric inputs (Type 3 & 4)
        function verifyArabicAns() {
            const val = parseInt(document.getElementById('input-arabic-ans').value);
            if (isNaN(val)) return;

            const feedback = document.getElementById('feedback-text');
            if (val === targetValue) {
                playSound('correct');
                quantityVerified = true;
                
                feedback.innerHTML = `🎉 <b>答對了！數量正是 ${targetValue}！</b> 下一步，請進行口說錄音檢核。`;
                feedback.className = "text-md font-bold text-green-700";

                document.getElementById('speech-check-div').classList.remove('hidden');
                document.getElementById('speech-status').innerText = "點擊按鈕，念出這個數字";
                document.getElementById('speech-status').className = "text-sm font-black text-stone-700 animate-pulse";
            } else {
                playSound('wrong');
                feedback.innerHTML = `❌ <b>算得不太對喔，再數一次試試看！</b>`;
                feedback.className = "text-md font-bold text-red-600";
            }
        }

        // Verify Quantity on board (Type 1 & 2)
        function verifyQuantity() {
            const sumVal = (placedHundreds * 100) + (placedTens * 10) + placedOnes;
            const feedback = document.getElementById('feedback-text');

            if (sumVal === targetValue) {
                playSound('correct');
                quantityVerified = true;

                feedback.innerHTML = `🎉 <b>擺放數量正確！一共是 ${targetValue}！</b> 下一步，請進行口說語音檢核！`;
                feedback.className = "text-md font-bold text-green-700";
                
                document.getElementById('speech-check-div').classList.remove('hidden');
                document.getElementById('speech-status').innerText = "點擊按鈕，念出這個數字";
                document.getElementById('speech-status').className = "text-sm font-black text-stone-700 animate-pulse";
            } else {
                playSound('wrong');
                if (sumVal > targetValue) {
                    feedback.innerHTML = `⚠️ <b>太多囉！請拿掉一些，再數一次試試看。</b>`;
                } else {
                    feedback.innerHTML = `🪙 <b>不夠喔！請再加一點，再數一次試試看。</b>`;
                }
                feedback.className = "text-md font-bold text-red-600";
            }
        }

        // AI Speech Recognition
        function toggleRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                // Fallback if not supported
                const typed = prompt("此瀏覽器不支援語音辨識。請手動輸入中文讀音（例如：一百四十七）：");
                if (typed) verifySpeech(typed);
                return;
            }

            if (isRecording) {
                recognition.stop();
                return;
            }

            playSound('click');
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                const recBtn = document.getElementById('btn-record');
                recBtn.classList.add('mic-active');
                document.getElementById('speech-status').innerText = "正在錄音中...請念出中文讀法";
                document.getElementById('speech-status').className = "text-sm font-black text-red-600";
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.trim().replace(/[。？，！\s]/g, '');
                verifySpeech(text);
            };

            recognition.onerror = (e) => {
                console.error(e);
                document.getElementById('speech-status').innerText = "錄音錯誤，請再試一次";
                document.getElementById('speech-status').className = "text-sm font-bold text-red-500";
            };

            recognition.onend = () => {
                isRecording = false;
                const recBtn = document.getElementById('btn-record');
                recBtn.classList.remove('mic-active');
            };

            recognition.start();
        }

        function verifySpeech(transcript) {
            document.getElementById('speech-result-div').classList.remove('hidden');
            document.getElementById('speech-result-text').innerText = transcript;

            const acceptable = getAcceptableReadings(targetValue);
            const feedback = document.getElementById('feedback-text');

            // Format bad digit pronunciation warnings, e.g. "一四七" instead of "一百四十七"
            const digitSpelling = targetValue.toString().split('').map(d => {
                const map = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
                return map[parseInt(d)];
            }).join(''); // e.g. "一四七"

            if (acceptable.includes(transcript)) {
                playSound('correct');
                speechVerified = true;
                
                feedback.innerHTML = `🏆 <b>口說辨識成功！完全正確！</b> 你念了 <b>「${transcript}」</b>。完成了所有挑戰！`;
                feedback.className = "text-md font-bold text-green-700 font-extrabold animate-bounce";
                
                document.getElementById('speech-status').innerText = "辨識成功！";
                document.getElementById('speech-status').className = "text-sm font-black text-green-600";
            } else if (transcript.includes(digitSpelling) || transcript === digitSpelling) {
                playSound('wrong');
                feedback.innerHTML = `❌ <b>讀法不正確喔！</b> 你念成了『${transcript}』。請說出完整的位值讀法：<b>「${getChineseStandardReading(targetValue)}」</b>，不能只念數字喔！`;
                feedback.className = "text-md font-bold text-red-600";
                
                document.getElementById('speech-status').innerText = "讀法錯誤，請重試！";
                document.getElementById('speech-status').className = "text-sm font-bold text-red-500";
            } else {
                playSound('wrong');
                feedback.innerHTML = `❌ <b>辨識不符合！</b> 你念的是『${transcript}』，這不是 <b>${targetValue}</b> 的正確中文讀法。請看清數字再念一次！`;
                feedback.className = "text-md font-bold text-red-600";

                document.getElementById('speech-status').innerText = "讀音不相符，請重試";
                document.getElementById('speech-status').className = "text-sm font-bold text-red-500";
            }
        }

        function nextQuestion() {
            playSound('click');
            initGame();
        }
    </script>
