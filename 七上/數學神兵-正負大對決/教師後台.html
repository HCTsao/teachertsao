<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數學神兵 - 教師管理後台</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-panel: #1e293b;
      --bg-card: rgba(30, 41, 59, 0.7);
      --border-color: #334155;
      --text-dark: #f8fafc;
      --text-light-gray: #94a3b8;
      --neon-cyan: #0ea5e9;
      --neon-pink: #ec4899;
      --neon-green: #22c55e;
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --transition-speed: 0.2s;
    }

    body {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 40px auto;
      padding: 30px;
      background: var(--bg-panel);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      box-shadow: var(--glass-shadow);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      text-align: center;
      margin-top: 0;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--text-light-gray);
      font-size: 1.05rem;
      margin-bottom: 40px;
      font-weight: 500;
    }

    /* 控制面板 */
    .controls-row {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
    }

    .search-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      color: var(--text-dark);
      outline: none;
      transition: all var(--transition-speed);
      box-sizing: border-box;
    }

    .search-input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(14, 165, 233, 0.25);
    }

    .filter-select {
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      color: var(--text-dark);
      outline: none;
      cursor: pointer;
      min-width: 160px;
    }

    .filter-select:focus {
      border-color: var(--neon-cyan);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease-out;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #be123c, #e11d48);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(225, 29, 72, 0.25);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(225, 29, 72, 0.4);
    }

    .btn-secondary {
      background: var(--border-color);
      color: var(--text-dark);
      text-decoration: none;
    }

    .btn-secondary:hover {
      background: #475569;
      transform: translateY(-2px);
    }

    /* 數據表格 */
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      background: rgba(15, 23, 42, 0.8);
      color: var(--text-light-gray);
      font-weight: 800;
      padding: 16px 20px;
      border-bottom: 2px solid var(--border-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-dark);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(51, 65, 85, 0.2);
    }

    /* 狀態勳章 */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .badge-success {
      background: rgba(34, 197, 94, 0.15);
      color: var(--neon-green);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-danger {
      background: rgba(236, 72, 153, 0.15);
      color: var(--neon-pink);
      border: 1px solid rgba(236, 72, 153, 0.3);
    }

    .badge-mode {
      background: rgba(14, 165, 233, 0.15);
      color: var(--neon-cyan);
      border: 1px solid rgba(14, 165, 233, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light-gray);
      font-style: italic;
      font-size: 1.1rem;
    }

    .stat-badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-light-gray);
    }

    .stat-badge span {
      color: var(--neon-cyan);
      font-size: 1.15rem;
      margin-left: 6px;
      font-weight: 900;
    }

    .stats-container {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 數學神兵 - 教師管理後台</h1>
    <div class="subtitle">即時監控學生之正負數加減乘除絕對值作答歷程</div>

    <!-- 統計概覽 -->
    <div class="stats-container">
      <div class="stat-badge">總作答題數 <span id="stat-total">0</span></div>
      <div class="stat-badge">答對題數 <span id="stat-correct" style="color: var(--neon-green);">0</span></div>
      <div class="stat-badge">整體正確率 <span id="stat-rate" style="color: #eab308;">0%</span></div>
    </div>

    <!-- 控制列 -->
    <div class="controls-row">
      <div class="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 輸入班級/座號/姓名、題目關鍵字進行搜尋...">
      </div>
      <select id="mode-filter" class="filter-select">
        <option value="all">所有遊戲模式</option>
        <option value="戰役模式">🤖 戰役模式</option>
        <option value="雙人同屏">⚔️ 雙人同屏</option>
        <option value="線上對決">🌐 線上對決</option>
      </select>
      <select id="result-filter" class="filter-select">
        <option value="all">所有答題結果</option>
        <option value="correct">✅ 答對</option>
        <option value="wrong">❌ 答錯</option>
      </select>
      <button class="btn btn-primary" onclick="loadData()">🔄 重新整理</button>
      <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空所有數據</button>
      <a href="index.html" class="btn btn-secondary">🔙 返回數學神兵</a>
    </div>

    <!-- 表格 -->
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th style="width: 8%;">序號</th>
            <th style="width: 17%;">作答時間</th>
            <th style="width: 25%;">學生班級/座號/姓名</th>
            <th style="width: 15%;">遊戲模式</th>
            <th style="width: 15%;">作答題目</th>
            <th style="width: 10%;">選答選項</th>
            <th style="width: 10%;">作答結果</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- JS 動態渲染 -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let rawRecords = [];

    function loadData() {
      try {
        rawRecords = JSON.parse(localStorage.getItem('math_hero_records') || '[]');
      } catch (e) {
        console.error(e);
        rawRecords = [];
      }
      renderTable();
    }

    function renderTable() {
      const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
      const modeFilter = document.getElementById('mode-filter').value;
      const resultFilter = document.getElementById('result-filter').value;
      const tbody = document.getElementById('table-body');
      
      tbody.innerHTML = '';

      // 進行資料篩選
      const filtered = rawRecords.filter(item => {
        // 1. 關鍵字搜尋
        const matchSearch = !searchVal || 
                            (item.studentInfo && item.studentInfo.toLowerCase().includes(searchVal)) ||
                            (item.question && item.question.toLowerCase().includes(searchVal)) ||
                            (item.selectedOption && item.selectedOption.toLowerCase().includes(searchVal));
        
        // 2. 模式篩選
        const matchMode = modeFilter === 'all' || item.mode === modeFilter;

        // 3. 結果篩選
        let matchResult = true;
        if (resultFilter === 'correct') matchResult = item.isCorrect === true;
        else if (resultFilter === 'wrong') matchResult = item.isCorrect === false;

        return matchSearch && matchMode && matchResult;
      });

      // 更新統計指標
      updateStats(filtered);

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-state">📭 尚無符合篩選條件的作答數據歷程</td>
          </tr>
        `;
        return;
      }

      filtered.forEach((item, index) => {
        const tr = document.createElement('tr');
        
        const indexTd = document.createElement('td');
        indexTd.innerText = filtered.length - index;
        
        const timeTd = document.createElement('td');
        timeTd.innerText = item.time || '';
        
        const studentTd = document.createElement('td');
        studentTd.style.fontWeight = 'bold';
        studentTd.innerText = item.studentInfo || '';
        
        const modeTd = document.createElement('td');
        modeTd.innerHTML = `<span class="badge badge-mode">${item.mode || '未知'}</span>`;
        
        const questionTd = document.createElement('td');
        questionTd.style.fontFamily = 'Outfit, monospace';
        questionTd.style.fontWeight = '700';
        questionTd.innerText = item.question || '';
        
        const selectTd = document.createElement('td');
        selectTd.style.fontWeight = '700';
        selectTd.innerText = item.selectedOption || '';
        
        const resultTd = document.createElement('td');
        if (item.isCorrect) {
          resultTd.innerHTML = '<span class="badge badge-success">✅ 答對</span>';
        } else {
          resultTd.innerHTML = '<span class="badge badge-danger">❌ 答錯</span>';
        }

        tr.appendChild(indexTd);
        tr.appendChild(timeTd);
        tr.appendChild(studentTd);
        tr.appendChild(modeTd);
        tr.appendChild(questionTd);
        tr.appendChild(selectTd);
        tr.appendChild(resultTd);

        tbody.appendChild(tr);
      });
    }

    function updateStats(records) {
      const total = records.length;
      const correct = records.filter(r => r.isCorrect).length;
      const rate = total > 0 ? Math.round((correct / total) * 100) : 0;

      document.getElementById('stat-total').innerText = total;
      document.getElementById('stat-correct').innerText = correct;
      document.getElementById('stat-rate').innerText = `${rate}%`;
    }

    function clearAllData() {
      // 依據使用者要求，不會在 UI 上給予密碼提示
      const password = prompt("請輸入管理密碼確認清空所有數據：");
      if (password === '0987912307') {
        localStorage.removeItem('math_hero_records');
        loadData();
      } else {
        alert("密碼錯誤，無法清空數據！");
      }
    }

    // 綁定動態篩選事件
    document.getElementById('search-input').addEventListener('input', renderTable);
    document.getElementById('mode-filter').addEventListener('change', renderTable);
    document.getElementById('result-filter').addEventListener('change', renderTable);

    // 初始化載入
    window.onload = loadData;
  </script>
</body>
</html>
