<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數線移動探險 - 整數的加減法</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 回教具首頁按鈕 -->
  <a href="../../index.html" class="portal-back-btn">🏠 回教具首頁</a>

  <div class="app-container">
    <!-- 明亮漸層背景光影 -->
    <div class="bg-glow bg-glow-cyan"></div>
    <div class="bg-glow bg-glow-purple"></div>

    <!-- 標題 -->
    <header class="hero-header">
      <div class="badge">114課綱數學教具</div>
      <h1 class="main-title">數線移動探險<span class="sub-gradient">整數的加減法</span></h1>
    </header>

    <!-- 1. 模式選單畫面 -->
    <section id="start-screen" class="screen active">
      <div class="setup-container">
        <div class="setup-card">
          <h2>選擇遊戲模式</h2>
          <div class="btn-group-row">
            <button type="button" id="btn-mode-practice" class="mode-btn active" data-mode="practice">
              <span class="btn-icon">💡</span>
              <span class="btn-text">自由練習模式</span>
            </button>
            <button type="button" id="btn-mode-challenge" class="mode-btn" data-mode="challenge">
              <span class="btn-icon">🏆</span>
              <span class="btn-text">冒險挑戰模式</span>
            </button>
          </div>
        </div>



        <button type="button" id="btn-start-game" class="start-play-btn">
          <span>開始探險</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- 2. 遊戲主畫面 -->
    <section id="game-screen" class="screen">
      <!-- 頂部資訊列 -->
      <div class="game-info-bar">
        <div class="info-badge">
          <span id="info-mode-text">練習模式</span>
        </div>
        <div class="info-progress">
          <span id="info-progress-text">第 1 / 10 題</span>
          <div class="progress-bar-container">
            <div id="progress-bar-fill" class="progress-bar-fill"></div>
          </div>
        </div>
        <div class="info-score" id="info-score-box">
          得分：<span id="info-score-val">0</span>
        </div>
        <div class="info-timer" id="info-timer-box">
          ⏱️ <span id="info-timer-val">0.0s</span>
        </div>
      </div>

      <!-- 核心對決卡片 -->
      <div class="battle-card">
        <!-- 題目算式展示 -->
        <div class="question-container">
          <div class="equation-label">請在數線上操作以下算式：</div>
          <div id="question-equation" class="equation-display">(-3) - (-5) = ?</div>
        </div>

        <!-- 互動數線區 -->
        <div class="number-line-section">
          <div class="number-line-scroll-container">
            <div class="number-line-wrapper">
              <!-- 數線軸 -->
              <div class="number-line-axis"></div>
              
              <!-- 刻度與數字 -->
              <div class="number-line-ticks" id="number-line-ticks-container">
                <!-- 由 JS 動態生成 -10 到 10 的刻度 -->
              </div>
              
              <!-- 動態跳躍/位移指示弧線 (SVG) -->
              <svg class="displacement-svg" id="displacement-svg" width="100%" height="100%">
                <defs>
                  <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--neon-yellow)" />
                  </marker>
                  <marker id="arrow-correct" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 1 L 10 5 L 0 9 z" fill="var(--neon-green)" />
                  </marker>
                </defs>
                <path id="displacement-path" d="" fill="none" stroke="var(--neon-yellow)" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrow)" />
                <path id="displacement-path-correct" d="" fill="none" stroke="var(--neon-green)" stroke-width="4" marker-end="url(#arrow-correct)" style="display:none;" />
              </svg>

              <!-- 棋子 (Pawn) -->
              <div class="pawn" id="game-pawn" style="display: none;">
                <div class="pawn-body">♟️</div>
                <div class="pawn-shadow"></div>
              </div>
            </div>
          </div>
          <div class="number-line-hint">💡 提示：在數線上左右滑動可檢視完整刻度，點擊刻度可直接放置棋子。</div>
        </div>

        <!-- 答題問題面板 -->
        <div class="questions-panel">
          <!-- 步驟一：選擇出發點 -->
          <div class="step-card" id="step-start-card">
            <div class="step-num">步驟 1</div>
            <div class="step-content">
              <h3>從哪個點出發？</h3>
              <div class="start-point-display">
                起點座標：<span id="selected-start-val" class="placeholder-val">請點擊數線刻度</span>
              </div>
            </div>
            <div class="step-status" id="step-start-status"></div>
          </div>

          <!-- 步驟二：移動方向與格子 -->
          <div class="step-card disabled" id="step-move-card">
            <div class="step-num">步驟 2</div>
            <div class="step-content">
              <h3>往左或往右幾格？</h3>
              <div class="move-inputs-row">
                <div class="direction-select">
                  <button type="button" class="dir-btn" data-dir="left" disabled>⬅️ 往左</button>
                  <button type="button" class="dir-btn" data-dir="right" disabled>➡️ 往右</button>
                </div>
                <div class="steps-input-box">
                  移動 <input type="number" id="input-steps" class="steps-input" min="1" max="20" placeholder="格數" disabled> 格
                </div>
              </div>
            </div>
            <div class="step-status" id="step-move-status"></div>
          </div>

          <!-- 步驟三：填寫最終答案 -->
          <div class="step-card disabled" id="step-answer-card">
            <div class="step-num">步驟 3</div>
            <div class="step-content">
              <h3>算式結果是多少？</h3>
              <div class="final-answer-row">
                <span class="final-answer-label" id="final-answer-formula-hint"></span>
                <span class="final-answer-equals"> = </span>
                <input type="number" id="input-final-answer" class="steps-input final-answer-input" placeholder="填答案" disabled>
              </div>
            </div>
            <div class="step-status" id="step-answer-status"></div>
          </div>
        </div>

        <!-- 按鈕控制列 -->
        <div class="control-actions">
          <button type="button" id="btn-submit" class="start-play-btn" style="width: 100%; display: none;">
            <span>送出移動答案</span>
          </button>
          <button type="button" id="btn-next" class="start-play-btn next-theme-btn" style="width: 100%; display: none;">
            <span>下一題 ➡️</span>
          </button>
        </div>

        <!-- 回饋訊息面板 -->
        <div class="feedback-panel hidden" id="feedback-panel">
          <div class="feedback-icon" id="feedback-icon">🎉</div>
          <div class="feedback-details">
            <h4 id="feedback-title">回答正確！</h4>
            <p id="feedback-text">棋子已成功移動到目標點。</p>
          </div>
        </div>
      </div>
    </section>

    <!-- 3. 挑戰結算畫面 -->
    <section id="result-screen" class="screen">
      <div class="result-card">
        <div class="result-icon-badge" id="result-badge-icon">👑</div>
        <h2 id="result-title">探險挑戰完成！</h2>
        <p class="result-subtitle" id="result-badge-name">數線移動大師</p>

        <div class="result-stats">
          <div class="stat-box">
            <span class="stat-label">挑戰題數</span>
            <span class="stat-value" id="result-total-questions">10 題</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">答對題數</span>
            <span class="stat-value text-green" id="result-correct-count">10 題</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">總答對率</span>
            <span class="stat-value text-blue" id="result-accuracy">100%</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">挑戰總用時</span>
            <span class="stat-value" id="result-total-time">45.2s</span>
          </div>
        </div>

        <div class="result-actions">
          <button type="button" id="btn-rematch" class="start-play-btn" style="margin: 0; width: 100%;">
            <span>再應戰一次</span>
          </button>
          <button type="button" id="btn-home" class="mode-btn" style="width: 100%;">
            <span>返回遊戲大廳</span>
          </button>
        </div>
      </div>
    </section>
  </div>

  <!-- JS Logic -->
  <script src="app.js"></script>
</body>
</html>
